services:
  mysql:
    image: mysql:8.0
    container_name: webook-mysql
    restart: always
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: "13520"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      extnetwork:
        ipv4_address: 172.21.0.2

  redis:
    image: redis:7.2-alpine
    container_name: webook-redis
    restart: always
    mem_limit: 128m
    ports:
      - "6379:6379"
    networks:
      extnetwork:
        ipv4_address: 172.21.0.3
    volumes:
      - /home/docker/redis:/data
      # - /home/docker/redis.conf:/usr/local/etc/redis/redis.conf
    # 使用命令开启持久化并设置密码
    # command: ["redis-server", "--requirepass", "13520", "--appendonly", "yes"]
    command: >
      redis-server
      --requirepass 13520
      --appendonly yes
      --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "13520", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      # docker inspect --format='{{json .State.Health}}' redis

  etcd:
    image: bitnami/etcd:3.5.17
    container_name: webook-etcd
    restart: always
    mem_limit: 128m
    environment:
      ALLOW_NONE_AUTHENTICATION: "no"
      ETCD_ROOT_PASSWORD: "13520"
      ETCD_ADVERTISE_CLIENT_URLS: "http://webook-etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    networks:
      extnetwork:
        ipv4_address: 172.21.0.4

  webook:
    image: train/webook:1.0.0
    container_name: webook-app
    build:
      context: ./webook
      dockerfile: Dockerfile
    restart: always
    working_dir: /app
    environment:
      APP_ENV: "config/prod.yaml"
    ports:
      - "8089:8089"
    depends_on:
      - mysql
      - redis
      - etcd
    networks:
      extnetwork:
        ipv4_address: 172.21.0.10

  kafka:
    image: 'apache/kafka:3.7.0'
    container_name: webook-kafka
    restart: always
    mem_limit: 512m
    ports:
      - '9092:9092'
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      # PLAINTEXT 供容器间通信（用容器名），EXTERNAL 供宿主机 Windows 访问（用虚拟机 IP）
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://192.168.150.101:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 允许自动创建 topic，线上不要开启
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # 单节点必须设为 1，默认值 3 会因副本不足无法创建内部 topic
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 限制 JVM 堆内存，2G 虚拟机必须控制
      KAFKA_HEAP_OPTS: '-Xmx256m -Xms256m'
      # 固定集群 ID，重启不丢数据
      CLUSTER_ID: webook-kafka-kraft-cluster-id
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    networks:
      extnetwork:
        ipv4_address: 172.21.0.5

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: webook-es
    restart: always
    mem_limit: 1024m
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      extnetwork:
        ipv4_address: 172.21.0.6

  ollama:
    image: ollama/ollama:0.6.2
    container_name: webook-ollama
    restart: always
    mem_limit: 2048m
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      extnetwork:
        ipv4_address: 172.21.0.7

  # ── 前端 + 反向代理 ──────────────────────────────────────
  webook-fe:
    image: train/webook-fe:1.0.0
    container_name: webook-fe
    build:
      context: ./webook-fe
      dockerfile: Dockerfile
      args:
        # 同源部署：浏览器调 /api/*，nginx 剥前缀转后端
        NEXT_PUBLIC_API_BASE_URL: /api
    restart: always
    mem_limit: 512m
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    # 不直接对外暴露端口，统一走 nginx
    expose:
      - "3000"
    networks:
      extnetwork:
        ipv4_address: 172.21.0.27

  nginx:
    image: nginx:1.27-alpine
    container_name: webook-nginx
    restart: always
    mem_limit: 128m
    ports:
      - "80:80"
      # 上 HTTPS 后开 443 + 挂证书
      # - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    # 不挂 /var/log/nginx：保留官方镜像的 access.log → /dev/stdout / error.log → /dev/stderr 软链
    # 让 docker 接管日志（docker logs / 配置 logrotate driver），避免文件无限增长
    depends_on:
      - webook
      - webook-fe
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      extnetwork:
        ipv4_address: 172.21.0.28

  # ── 监控链路 ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: webook-prometheus
    restart: always
    mem_limit: 256m
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    extra_hosts:
      # Linux 上让容器能访问宿主机的 webook 应用（Mac/Windows 已原生支持）
      - "host.docker.internal:host-gateway"
    networks:
      extnetwork:
        ipv4_address: 172.21.0.20

  grafana:
    image: grafana/grafana:11.6.0
    container_name: webook-grafana
    restart: always
    mem_limit: 256m
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      extnetwork:
        ipv4_address: 172.21.0.21

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: webook-mysqld-exporter
    restart: always
    mem_limit: 64m
    environment:
      MYSQLD_EXPORTER_PASSWORD: "13520"
    command:
      - "--mysqld.username=root"
      - "--mysqld.address=mysql:3306"
    depends_on:
      - mysql
    networks:
      extnetwork:
        ipv4_address: 172.21.0.22

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: webook-redis-exporter
    restart: always
    mem_limit: 64m
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "13520"
    depends_on:
      - redis
    networks:
      extnetwork:
        ipv4_address: 172.21.0.23

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: webook-kafka-exporter
    restart: always
    mem_limit: 64m
    command:
      - "--kafka.server=kafka:9092"
    depends_on:
      - kafka
    networks:
      extnetwork:
        ipv4_address: 172.21.0.24

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: webook-node-exporter
    restart: always
    mem_limit: 64m
    networks:
      extnetwork:
        ipv4_address: 172.21.0.25

  # ── 追踪链路 ──────────────────────────────────────────────
  zipkin:
    image: openzipkin/zipkin:3.4
    container_name: webook-zipkin
    restart: always
    # mem 存储足够用 512m；切 ES 存储后写入压力增大，建议调到 1024m
    mem_limit: 512m
    ports:
      - "9411:9411"
    environment:
      # 暂时用内存存储：重启 trace 数据丢失，开发够用
      STORAGE_TYPE: mem
      JAVA_OPTS: "-Xms256m -Xmx256m"
      # 切 ES 存储时打开下面三行（并把 STORAGE_TYPE 改成 elasticsearch）：
      # ES_HOSTS: "http://elasticsearch:9200"
      # ES_INDEX: "zipkin"
      # ES_INDEX_REPLICAS: "0"   # 单节点 ES 必须 0，否则索引黄
    # depends_on:                # 切 ES 时打开
    #   - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      extnetwork:
        ipv4_address: 172.21.0.26

  # ── bitnami/kafka 备用配置（镜像源可用时切换） ──────────────
  # kafka:
  #   image: 'bitnami/kafka:3.6.0'
  #   container_name: webook-kafka
  #   restart: always
  #   mem_limit: 512m
  #   ports:
  #     - '9092:9092'
  #     - '9094:9094'
  #   environment:
  #     - KAFKA_CFG_NODE_ID=0
  #     - KAFKA_CFG_PROCESS_ROLES=controller,broker
  #     - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://:9093,EXTERNAL://0.0.0.0:9094
  #     - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
  #     - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
  #     - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
  #     - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
  #     - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
  #     - KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR=1
  #     - KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
  #     - KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR=1
  #     - KAFKA_HEAP_OPTS=-Xmx256m -Xms256m
  #     - KAFKA_KRAFT_CLUSTER_ID=webook-kafka-kraft-cluster-id
  #   volumes:
  #     - kafka-data:/bitnami/kafka
  #   networks:
  #     extnetwork:
  #       ipv4_address: 172.21.0.5

volumes:
  mysql-data:
  kafka-data:
  es-data:
  ollama-data:
  prometheus-data:
  grafana-data:

networks:
  extnetwork:
    external: true
    name: extnetwork
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ── 常用命令 ──────────────────────────────────────────────
#
# 创建网络（首次）:
#   docker network create --subnet=172.21.0.0/16 extnetwork
# 启动全部:
#   docker compose up -d
# 启动指定服务:
#   docker compose up -d mysql redis kafka webook
# 只启动监控栈:
#   docker compose up -d prometheus grafana mysqld-exporter redis-exporter kafka-exporter
# 启动追踪栈（Zipkin）:
#   docker compose up -d zipkin
#   # 浏览器访问 http://虚拟机IP:9411
# 启动前端 + 反代（先 build 前端镜像）:
#   docker compose build webook-fe && docker compose up -d webook-fe nginx
#   # 浏览器访问 http://虚拟机IP（80 端口，nginx 同源代理后端 /api）
# 构建并启动 webook:
#   docker compose build webook && docker compose up -d webook
# 强制重建（不用缓存）:
#   docker compose build --no-cache webook
# 查看运行状态:
#   docker compose ps
# 查看日志:
#   docker compose logs -f webook
#   docker compose logs -f --tail=100 webook
# 进入容器:
#   docker compose exec webook sh
# 重启单个服务:
#   docker compose restart webook
# 停止全部:
#   docker compose down
# 停止并删除数据卷（慎用）:
#   docker compose down -v
# 清理未使用的镜像:
#   docker image prune -f
