name: Webook Frontend CI

on:
  push:
    # 不用 paths 过滤：否则 tag push 指向 diff 不含 webook-fe/** 的 commit 时会静默不触发
    branches: [master, feature]
    tags: ['webook-fe-v*.*.*']
  pull_request:
    branches: [master]
    paths:
      - 'webook-fe/**'
      - '.github/workflows/webook-fe-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/webook-fe

defaults:
  run:
    working-directory: webook-fe

jobs:
  lint-build:
    runs-on: ubuntu-latest
    # 继承顶层 permissions: contents: read
    steps:
      - uses: actions/checkout@v5

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webook-fe/package-lock.json

      - name: 安装依赖
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: 构建验证
        run: npm run build
        env:
          # CI 仅验证编译通过，真实 API 地址由 build-push job 按环境注入
          NEXT_PUBLIC_API_BASE_URL: /api

  build-push:
    needs: lint-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=master-${{ github.sha }},enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=feature-${{ github.sha }},enable=${{ github.ref == 'refs/heads/feature' }}
            type=match,pattern=webook-fe-v(.*),group=1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: webook-fe
          file: webook-fe/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
          cache-from: type=gha,scope=webook-fe
          cache-to: type=gha,mode=max,scope=webook-fe
