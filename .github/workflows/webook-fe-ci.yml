name: Webook Frontend CI

on:
  push:
    # 不用 paths 过滤：否则 tag push 指向 diff 不含 webook-fe/** 的 commit 时会静默不触发
    branches: [main, 'feature/**']
    tags: ['webook-fe-v*.*.*']
    paths-ignore:
      - 'webook/**'
      - 'deploy/**'
      - 'docs/**'
      - 'sandbox/**'
      - 'prd/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths:
      - 'webook-fe/**'
      - '.github/workflows/webook-fe-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

# 同一 ref 的新 push 自动取消还在跑的旧 run，省 runner 时间（快速 amend + push 场景）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/webook-fe

defaults:
  run:
    working-directory: webook-fe

jobs:
  lint-build:
    runs-on: ubuntu-latest
    # 继承顶层 permissions: contents: read
    steps:
      - uses: actions/checkout@v5

      - name: 设置 Node 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webook-fe/package-lock.json

      - name: 安装依赖
        run: npm ci --no-audit --no-fund

      - name: ESLint
        run: npm run lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: 构建验证
        run: npm run build
        env:
          # CI 仅验证编译通过，真实 API 地址由 build-push job 按环境注入
          NEXT_PUBLIC_API_BASE_URL: /api

  build-push:
    needs: lint-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支：main-latest（滚动）+ main-<sha>（可回溯）
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            # feature/** 分支：feature-<sha>
            type=raw,value=feature-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/feature/') }}
            # tag webook-fe-v1.2.3 → 1.2.3
            type=match,pattern=webook-fe-v(.*),group=1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: webook-fe
          file: webook-fe/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=/api
          # 关掉 attestation（同 webook-ci.yml，老版 docker-compose 解析不了）
          provenance: false
          sbom: false
          cache-from: type=gha,scope=webook-fe
          cache-to: type=gha,mode=max,scope=webook-fe
