name: Webook Core Service CI

on:
  push:
    # 不用 paths 过滤：否则 tag push 指向 diff 不含 webook/** 的 commit 时会静默不触发
    # 由 pull_request 的 paths 过滤保底，减少无关 PR 跑 CI 即可
    branches: [main, 'feature/**']
    tags: ['webook-core-v*.*.*']
    paths-ignore:
      - 'webook-fe/**'
      - 'webook/chat/**'        # chat 服务有独立 CI
      - 'webook/comment/**'     # comment 服务有独立 CI
      - 'webook/interaction/**' # interaction 服务有独立 CI
      - 'webook/worker/**'      # worker 服务有独立 CI
      - 'deploy/**'
      - 'docs/**'
      - 'sandbox/**'
      - 'prd/**'
      - '**.md'
  pull_request:
    branches: [main]
    paths:
      - 'webook/internal/**'
      - 'webook/api/**'
      - 'webook/pkg/**'
      - 'webook/go.mod'
      - 'webook/go.sum'
      - '.github/workflows/webook-core-ci.yml'
  workflow_dispatch:           # 允许手动触发调试

permissions:
  contents: read               # 默认最小权限，build-push job 自己 override

# 同一 ref 的新 push 自动取消还在跑的旧 run，省 runner 时间（快速 amend + push 场景）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/webook-core
  MODULE: github.com/webook
  # 禁止 CI 里修改 go.sum；依赖漂移必须本地先提交，防 CI 偷偷改依赖
  GOFLAGS: "-mod=readonly"

defaults:
  run:
    working-directory: webook

jobs:
  lint-test:
    runs-on: ubuntu-latest
    # 继承顶层 permissions: contents: read
    steps:
      - uses: actions/checkout@v5

      - name: 设置 Go 环境
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: webook/go.sum

      - name: 安装 goimports（走 setup-go cache，已装就跳过）
        run: test -x "$(go env GOPATH)/bin/goimports" || go install golang.org/x/tools/cmd/goimports@v0.26.0

      - name: 检查 import 顺序
        run: |
          DIFF=$(goimports -local "$MODULE" -l .)
          if [ -n "$DIFF" ]; then
            echo "❌ 以下文件 import 未按规范排序，请本地执行：goimports -local $MODULE -w ."
            echo "$DIFF"
            exit 1
          fi
          echo "✅ import 顺序规范"

      - name: go vet
        run: go vet ./...

      - name: 单元测试
        # main 和 tag 发布路径跑 -race（慢 2-5x 但抓并发 bug）；feature 开发快速反馈
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == refs/tags/* ]]; then
            go test -race $(go list ./... | grep -v /integration)
          else
            go test $(go list ./... | grep -v /integration)
          fi

  build-push:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Dockerfile 已是多阶段（builder stage 内置 go build -tags=k8s），CI 不需外部预编译

      - name: 提取镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # main 分支：main-latest（滚动）+ main-<sha>（可回溯）
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=main-${{ github.sha }},enable=${{ github.ref == 'refs/heads/main' }}
            # feature/** 分支：feature-<sha>
            type=raw,value=feature-${{ github.sha }},enable=${{ startsWith(github.ref, 'refs/heads/feature/') }}
            # tag webook-core-v1.2.3 → 1.2.3
            type=match,pattern=webook-core-v(.*),group=1

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: webook
          file: webook/internal/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.sha }}
          # 关掉 provenance / sbom attestation，产纯 manifest 而非 OCI index
          # 老版 docker-compose（CentOS 7 自带的 v1）解析 OCI index 里 unknown/unknown
          # attestation manifest 会报 "manifest unknown"
          provenance: false
          sbom: false
          cache-from: type=gha,scope=webook-core
          cache-to: type=gha,mode=max,scope=webook-core
