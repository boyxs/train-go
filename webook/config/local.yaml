etcd:
  endpoint: http://127.0.0.1:2379
  path: /webook
  type: yaml

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

#web:
#  logger:
#    allowReqBody: true
#    allowResBody: true
#    maxReqLen: 2048
#    maxResLen: 2048
#    maxPathLen: 1024

llm:
  providers:
    - name: deepseek
      apiKey: "sk-405db05b37ac418b91268403d32a55aa"
      baseUrl: "https://api.deepseek.com"
      model: "deepseek-chat"
      maxTokens: 2048
      timeout: 60
    - name: kimi
      apiKey: "sk-KURYxBodidmpQmZsL1SGrEiDoWcETmKDkgr70qsfmEDleS6d"
      baseUrl: "https://api.moonshot.cn/v1"
      model: "kimi-k2.5"
      maxTokens: 2048
      timeout: 60

kafka:
  addrs:
    - "localhost:9094"
  # 网络超时（秒）
  dialTimeout: 10
  readTimeout: 10
  writeTimeout: 10
  # Producer
  producerTimeout: 10  # broker ack 超时（秒）
  producerRetryMax: 0  # 失败不重试，直接降级同步
  # Metadata
  metadataRetryMax: 1
  metadataRetryBackoff: 250  # 毫秒
  metadataTimeout: 5
  # Consumer group
  consumerGroup: "interaction-consumer"
  # Consumer 失败退避（秒）
  consumerBackoffInitial: 5
  consumerBackoffMax: 60

es:
  addr: "http://localhost:9200"

ollama:
  baseUrl: "http://localhost:11434"
  model: "bge-m3"
  timeout: 5

embedding:
  baseUrl: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  apiKey: "sk-ef23911b061943b681584ac467c4cd28"
  model: "text-embedding-v3"
  dims: 1024
  timeout: 30

otel:
  # 本地开发：要 docker compose up -d otel-collector 把 4317 暴露到宿主机
  endpoint: "localhost:4317"
  serviceName: "webook"
  serviceVersion: "0.1.0"
  env: "local"
  # 采样率公式详见 config/prod.yaml 注释或 docs/opentelemetry/06-best-practices.md。
  sampleRatio: 1.0          # local 全采样（本机调试全量看）

#etcdctl --endpoints=127.0.0.1:2379 put /webook < config/local.yaml

# 应用配置命名标准（详见 webook/CLAUDE.md「环境说明」）：
#   local.yaml 本地开发（你 go run 用，指向本机 docker compose 起的基础设施）
#   dev.yaml   预留（CI 集成测试 / 远端 dev 服务器；L1 阶段一未启用）
#   prod.yaml  生产（打进镜像的默认配置，L2 起由 K8s Secret 环境变量覆盖敏感字段）
