# search prod 环境配置。差异：otel.env=prod / sample_ratio=0.1 / logger info。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-search"
  type: "yaml"

server:
  http:
    addr: ":8080" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8081"
    name: "webook-search"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  es:
    addrs: # 多节点即集群
      - "http://webook-es:9200"
    username: "elastic"
    password: ${ES_PASS}
    index: article # 逻辑别名；物理版本索引 article_v1 由 ensureIndex 建并挂此别名（改 mapping 时 v2 重灌 + 切别名 = 零停机）
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

embedding:
  base_url: "https://qianfan.baidubce.com/v2"
  api_key: ${QIANFAN_API_KEY}
  model: "qwen3-embedding-0.6b"
  dims: 1024
  timeout: 30s

ollama:
  base_url: "http://webook-ollama:11434"
  model: "bge-m3"
  timeout: 5s

logger:
  level: info
  development: false
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-search"
  service_version: "0.1.0"
  env: "prod"
  sample_ratio: 0.1
