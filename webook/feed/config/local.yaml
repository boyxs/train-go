# feed 本地配置。feed 无 MySQL——收件箱/发件箱全 Redis 投影；源数据经 gRPC 拉 relation + core(article)。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-feed"
  type: "yaml"

server:
  http:
    addr: ":8100" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8101"
    name: "webook-feed"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

client:
  grpc:
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"
    webook-core: # 回源 article gRPC（ListAuthorArticles）
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"

data:
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-feed"
  service_version: "0.1.0"
  env: "local"
  sample_ratio: 1.0

feed:
  big_v_threshold: 1000       # 粉丝数 >= 此值不写扩散，读时归并大V发件箱（推拉结合）
  inbox_cap: 2000             # 收件箱保留上限（ZREMRANGEBYRANK 裁 top N）
  inbox_ttl: 168h             # 收件箱 TTL（7d，+0~5min jitter）
  outbox_size: 100            # 发件箱保留上限，也是回源条数
  outbox_ttl: 1h              # 发件箱 TTL（+0~5min jitter）
  rebuild_max_followees: 1000 # 重建时关注数上限
  fanout_batch: 50            # ListFollowers 每批（relation 服务端 limit 封顶 50）
  new_count_max: 99           # 新内容提示条候选 id 上限（前端显示「N 篇」，超出按满显示）
