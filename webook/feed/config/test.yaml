# feed 集成测试配置（连本机测试 Redis）。feed 无 MySQL；集成测试用 fake gRPC 桩替代 relation/core。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-feed"
  type: "yaml"

server:
  http:
    addr: ":8100" # 仅 /metrics+/health
  grpc:
    addr: ":8101"
    name: "webook-feed"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP
    timeout: 5s

client:
  grpc:
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"

data:
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-feed-test"
  service_version: "0.1.0"
  env: "test"
  sample_ratio: 0.0

feed:
  big_v_threshold: 1000
  inbox_cap: 2000
  inbox_ttl: 168h
  outbox_size: 100
  outbox_ttl: 1h
  rebuild_max_followees: 1000
  fanout_batch: 50
  new_count_max: 99
