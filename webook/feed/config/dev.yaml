# feed dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
# feed 无 MySQL——收件箱/发件箱全 Redis 投影；源数据经 gRPC 拉 relation + core(article)。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-feed"
  type: "yaml"

server:
  http:
    addr: ":8100" # 仅 /metrics+/health
  grpc:
    addr: ":8101"
    name: "webook-feed"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

client:
  grpc:
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"

data:
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-feed"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0

feed:
  big_v_threshold: 1000
  inbox_cap: 2000
  inbox_ttl: 168h
  outbox_size: 100
  outbox_ttl: 1h
  rebuild_max_followees: 1000
  fanout_batch: 50
  new_count_max: 99
