syntax = "proto3";

package webook.ranking.v1;

option go_package = "github.com/boyxs/train-go/webook/api/gen/ranking/v1;rankingv1";

// RankingJobService 榜单重算/归档的触发入口，由 webook-core 实现（榜单数据与重算逻辑都在 core）。
// webook-worker（调度器）按 cron 定时调用本服务触发重算——worker 只调度不持数据，对齐 bolee-task 模式。
service RankingJobService {
  // Recompute 触发指定维度当日榜重算（hot/best/new）。
  rpc Recompute(RecomputeRequest) returns (RecomputeResponse);
  // Archive 触发当日榜归档落库 + 清 Redis。
  rpc Archive(ArchiveRequest) returns (ArchiveResponse);
}

// Dimension 榜单维度，作为 core↔worker 的共享契约（取代两端各写字符串字面量，编译期防漂移）。
// 仅含 worker 经 cron 触发重算的维度；category/unknown 不走本服务。
enum Dimension {
  DIMENSION_UNSPECIFIED = 0;
  DIMENSION_HOT = 1;
  DIMENSION_BEST = 2;
  DIMENSION_NEW = 3;
}

message RecomputeRequest {
  Dimension dimension = 1; // 榜单维度，见 Dimension 枚举
  string date = 2;         // 榜单日期 YYYY-MM-DD（日历日分桶键，非时间点，故用 string 不用 int64 毫秒）；空=今日
}
message RecomputeResponse {}

message ArchiveRequest {
  string date = 1;      // 归档日期 YYYY-MM-DD（日历日分桶键，非时间点）；空=今日
}
message ArchiveResponse {}
