syntax = "proto3";

package webook.interaction.v1;

option go_package = "github.com/webook/api/gen/interaction/v1;interactionv1";

// InteractionService 暴露互动数据的批量查询能力。
// 当前仅提供 chat 工具调用所需的两个方法，后续 ranking-service 拆分时复用同一 proto。
//
// 命名规范（Google AIP）：
//   - 标准 Get：单资源查询（AIP-131）
//   - 标准 BatchGet：按 id 批量查询（AIP-231）
//   - 标准 Search：全文/复杂查询（AIP-136 已知动词）
//   - 其它"按某种维度取多条"的查询统一用 Get 前缀作为 AIP-136 自定义动词，
//     避免与 AIP-132 标准 List（带 page_token 分页）混淆。
//   - 每个 RPC 拥有独立的 Request 与 Response message，即便 shape 一致也不复用。
service InteractionService {
  rpc GetHotBizIds(GetHotBizIdsRequest) returns (GetHotBizIdsResponse);
  rpc GetCollectedBizIds(GetCollectedBizIdsRequest) returns (GetCollectedBizIdsResponse);
}

message GetHotBizIdsRequest {
  string biz = 1;
  int32 limit = 2;
}

message GetHotBizIdsResponse {
  repeated int64 biz_ids = 1;
}

message GetCollectedBizIdsRequest {
  int64 uid = 1;
  string biz = 2;
  int32 limit = 3;
}

message GetCollectedBizIdsResponse {
  repeated int64 biz_ids = 1;
}
