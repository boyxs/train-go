# core dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-core"
  type: "yaml"

server:
  http:
    addr: ":8010"
    timeout: 15s
    access_log:
      allow_req_body: true
      allow_res_body: true
      max_req_len: 4096
      max_res_len: 4096
      max_path_len: 256
  grpc:
    addr: ":8011"
    name: "webook-core"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

client:
  grpc:
    webook-comment:
      target: "etcd:///service/webook-comment"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}
  kafka:
    addrs:
      - "webook-kafka:9092"
    dial_timeout: 10s
    read_timeout: 10s
    write_timeout: 10s
    producer_timeout: 10s
    producer_retry_max: 3
    metadata_retry_max: 3
    metadata_retry_backoff: 250ms
    metadata_timeout: 5s
  es:
    addr: "http://webook-es:9200"

llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s
    - name: kimi
      api_key: ${KIMI_API_KEY}
      base_url: "https://api.moonshot.cn/v1"
      model: "kimi-k2.5"
      max_tokens: 2048
      timeout: 60s

embedding:
  base_url: "https://qianfan.baidubce.com/v2"
  api_key: ${QIANFAN_API_KEY}
  model: "qwen3-embedding-0.6b"
  dims: 1024
  timeout: 30s

ollama:
  base_url: "http://webook-ollama:11434"
  model: "bge-m3"
  timeout: 5s

migrator:
  sdk:
    enabled: true
    task_name: "published_article_v1"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-core"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0
