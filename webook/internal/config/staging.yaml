# core staging 环境配置。差异：otel.env=staging / sample_ratio=0.5 / logger info。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-core"
  type: "yaml"

server:
  http:
    addr: ":8010"
    timeout: 15s
    access_log:
      allow_req_body: true
      allow_res_body: true
      max_req_len: 2048
      max_res_len: 2048
      max_path_len: 256
  grpc:
    addr: ":8011"
    name: "webook-core"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

client:
  grpc:
    webook-comment:
      target: "etcd:///service/webook-comment"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"
    webook-search:
      target: "etcd:///service/webook-search"
      balancer: "breaker_swrr"
    webook-tag:
      target: "etcd:///service/webook-tag"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    mode: single
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}
  kafka:
    addrs:
      - "webook-kafka:9092"
    dial_timeout: 10s
    read_timeout: 10s
    write_timeout: 10s
    producer_timeout: 10s
    producer_retry_max: 3
    metadata_retry_max: 3
    metadata_retry_backoff: 250ms
    metadata_timeout: 5s

llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s
    - name: kimi
      api_key: ${KIMI_API_KEY}
      base_url: "https://api.moonshot.cn/v1"
      model: "kimi-k2.5"
      max_tokens: 2048
      timeout: 60s

migrator:
  sdk:
    enabled: true
    task_name: "published_article_v1"

logger:
  level: info
  development: false
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-core"
  service_version: "0.1.0"
  env: "staging"
  sample_ratio: 0.5
