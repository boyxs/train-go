# core 集成测试配置（连本机测试库 webook_test，etcd path /webook-core-test）。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-core-test"
  type: "yaml"

server:
  http:
    addr: ":8010"
    timeout: 15s
    access_log:
      allow_req_body: true
      allow_res_body: true
      max_req_len: 2048
      max_res_len: 2048
      max_path_len: 256
  grpc:
    addr: ":8011"
    name: "webook-core"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

client:
  grpc:
    webook-comment:
      target: "etcd:///service/webook-comment"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"
    webook-relation:
      target: "etcd:///service/webook-relation"
      balancer: "breaker_swrr"
    webook-search:
      target: "etcd:///service/webook-search"
      balancer: "breaker_swrr"
    webook-tag:
      target: "etcd:///service/webook-tag"
      balancer: "breaker_swrr"
    webook-feed:
      target: "etcd:///service/webook-feed"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC
  redis:
    # 本地为方便测试默认单机（6379）；cluster 支持仍在（redisx.Config.Mode，代码不变，未来会用）。
    mode: single
    addr: "127.0.0.1:6379"
    password: "13520"
    # 集群模式（验 cluster 下 cache 多 key MGetPub 走 Get 流水线无 CROSSSLOT）：起 3 主集群后
    # 注释掉上面 mode/addr、启用下面即可切回。
    # mode: cluster
    # addrs:
    #   - "127.0.0.1:7001"
    #   - "127.0.0.1:7002"
    #   - "127.0.0.1:7003"
  kafka:
    addrs:
      - "localhost:9094"
    dial_timeout: 10s
    read_timeout: 10s
    write_timeout: 10s
    producer_timeout: 10s
    producer_retry_max: 0
    metadata_retry_max: 1
    metadata_retry_backoff: 250ms
    metadata_timeout: 5s

llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s
    - name: kimi
      api_key: ${KIMI_API_KEY}
      base_url: "https://api.moonshot.cn/v1"
      model: "kimi-k2.5"
      max_tokens: 2048
      timeout: 60s

migrator:
  sdk:
    enabled: true
    task_name: "published_article_v1"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-core-test"
  service_version: "0.1.0"
  env: "test"
  sample_ratio: 1.0
