## 本地开发版（Prometheus 二进制跑在宿主机 Windows，目标走 localhost）
## 用法：prometheus.exe --config.file=prometheus/prometheus.local.yml
## 只采集 webook 应用指标，不含 exporter
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # webook 应用（本地通过 localhost 访问）
  - job_name: 'webook-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8089']
