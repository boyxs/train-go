# worker 调度器本地配置：cron 定时任务 + Kafka 消费者，全部经 gRPC 派发。无 mysql；redis 仅 cron 锁。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  # 无 path/type：worker 静态配置，etcd 仅供 gRPC 服务发现，不接热更

server:
  http:
    addr: ":8050" # 仅 /metrics+/health（非 gin，不挂超时中间件）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"
    webook-feed:
      target: "etcd:///service/webook-feed"
      balancer: "breaker_swrr"

data:
  redis:
    mode: single
    addr: "127.0.0.1:6379"
    password: "13520"
    # 锁专用校准：关自动重试（acquire 非幂等，重发会重复计数）+ ctx 作用到 I/O
    max_retries: -1
    context_timeout_enabled: true
  kafka:
    addrs:
      - "localhost:9094"
    dial_timeout: 10s
    read_timeout: 10s
    write_timeout: 10s
    consumer_group: "webook-worker"
    consumer_backoff_initial: 5s
    consumer_backoff_max: 60s

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-worker"
  service_version: "0.1.0"
  env: "local"
  sample_ratio: 1.0
