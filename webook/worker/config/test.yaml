# worker 集成测试配置（连本机测试中间件）。

etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  # 无 path/type：worker 静态配置（LoadLocal），etcd 仅供 gRPC 服务发现，不接 viperx.WatchRemote 热更

http:
  addr: ":8050"

grpc:
  client:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"

redis:
  addr: 127.0.0.1:6379
  password: "13520"

kafka:
  addrs:
    - "localhost:9094"
  dialTimeout: 10
  readTimeout: 10
  writeTimeout: 10
  consumerGroup: "interaction-consumer-test"
  consumerBackoffInitial: 1
  consumerBackoffMax: 10

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "localhost:4317"
  serviceName: "webook-worker-test"
  serviceVersion: "0.1.0"
  env: "test"
  sampleRatio: 0.0
