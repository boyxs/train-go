# worker dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  # 无 path/type：worker 静态配置，etcd 仅供 gRPC 服务发现，不接热更

server:
  http:
    addr: ":8050" # 仅 /metrics+/health（非 gin，不挂超时中间件）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"

data:
  redis:
    mode: single
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}
    # 锁专用校准：关自动重试（acquire 非幂等）+ ctx 作用到 I/O
    max_retries: -1
    context_timeout_enabled: true
  kafka:
    addrs:
      - "webook-kafka:9092"
    dial_timeout: 10s
    read_timeout: 10s
    write_timeout: 10s
    consumer_group: "interaction-consumer"
    consumer_backoff_initial: 5s
    consumer_backoff_max: 60s

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-worker"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0
