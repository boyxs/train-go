# comment 本地配置（连本机 docker compose 中间件）。数据库与主仓共用（不分库），评论表 comment。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-comment"
  type: "yaml"

server:
  http:
    addr: ":8030" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8031"
    name: "webook-comment"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

# 敏感词过滤词库（DFA，见 ioc/sensitive.go）；生产应换更全字典
sensitive:
  words:
    - "赌博"
    - "诈骗"
    - "色情"
    - "代开发票"
    - "fuck"
    - "shit"

# 评论发表限流（Redis 滑动窗口，见 ioc/ratelimit.go）
ratelimit:
  comment:
    interval: 1m
    rate: 30

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-comment"
  service_version: "0.1.0"
  env: "local"
  sample_ratio: 1.0
