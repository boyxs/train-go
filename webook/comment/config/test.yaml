# comment 集成测试配置（连本机测试库）

# 远程配置中心：本地起 etcd 测试用；不可达时降级走本地 yaml
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-comment"
  type: "yaml"

http:
  addr: ":8030"

grpc:
  server:
    port: 8031
    name: "webook-comment"
    ttl: 30
    weight: 10

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

# JWT 验签密钥写死在 comment/consts/auth.go，与主仓 internal/consts/auth.go 同源（不读 yaml）

# 敏感词过滤词库（集成测试走 dao/repo 不经 service filter，这里仅保结构同构）
sensitive:
  words:
    - "赌博"
    - "诈骗"

# 评论发表限流（集成测试不经 service ratelimiter，仅保结构同构）
ratelimit:
  comment:
    interval: 1m
    rate: 30

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "localhost:4317"
  serviceName: "webook-comment-test"
  serviceVersion: "0.1.0"
  env: "test"
  sampleRatio: 0.0
