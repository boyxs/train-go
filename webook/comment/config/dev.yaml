# comment dev 环境配置（同构 internal/config/dev.yaml）
# 差异点：otel.env=dev / sampleRatio=1.0 / logger debug 级 / 中间件用容器名
# 数据库与主仓共享同一份 webook 库（不分库），靠表名隔离

# 远程配置中心：与主仓共用 etcd 实例，path 独立（/webook-comment 不踩 /webook）
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-comment"
  type: "yaml"

http:
  addr: ":8030"

grpc:
  server:
    port: 8031
    name: "webook-comment"
    ttl: 30
    weight: 10

mysql:
  dsn: 'root:13520@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC'

redis:
  addr: 'webook-redis:6379'
  password: '13520'

# JWT 验签密钥写死在 comment/consts/auth.go，与主仓 internal/consts/auth.go 同源（不读 yaml）

# 敏感词过滤词库（DFA，见 ioc/sensitive.go）。P0 起始词表，生产应换更全字典 + 文件/远程加载热更
sensitive:
  words:
    - "赌博"
    - "诈骗"
    - "色情"
    - "代开发票"
    - "fuck"
    - "shit"

# 评论发表限流（Redis 滑动窗口，见 ioc/ratelimit.go），防刷评论
ratelimit:
  comment:
    interval: 1m
    rate: 30

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "otel-collector:4317"
  serviceName: "webook-comment"
  serviceVersion: "0.1.0"
  env: "dev"
  sampleRatio: 1.0
