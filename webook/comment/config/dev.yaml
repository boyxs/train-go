# comment dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-comment"
  type: "yaml"

server:
  http:
    addr: ":8030" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8031"
    name: "webook-comment"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

sensitive:
  words:
    - "赌博"
    - "诈骗"
    - "色情"
    - "代开发票"
    - "fuck"
    - "shit"

ratelimit:
  comment:
    interval: 1m
    rate: 30

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-comment"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0
