# relation dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
# 数据库与主仓共享同一份 webook 库（不分库），靠表名隔离（relation_follow/relation_stats/relation_block）。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-relation"
  type: "yaml"

server:
  http:
    addr: ":8060" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8061"
    name: "webook-relation"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-relation"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0
