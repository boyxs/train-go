# interaction 服务本地配置（连本机 docker compose 起的中间件）
# 数据库与主仓共用（不分库），互动表 interaction / user_interaction

# 远程配置中心：与主仓共用同一个 etcd 实例，但 path 独立（/webook-interaction 不踩 /webook）
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-interaction"
  type: "yaml"

http:
  addr: ":8040"

grpc:
  server:
    port: 8041
    name: "webook-interaction"
    ttl: 30
    weight: 10

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "localhost:4317"
  serviceName: "webook-interaction"
  serviceVersion: "0.1.0"
  env: "local"
  sampleRatio: 1.0
