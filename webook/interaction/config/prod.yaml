# interaction prod 环境配置。差异：otel.env=prod / sample_ratio=0.1 / logger info。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-interaction"
  type: "yaml"

server:
  http:
    addr: ":8040" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8041"
    name: "webook-interaction"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

logger:
  level: info
  development: false
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-interaction"
  service_version: "0.1.0"
  env: "prod"
  sample_ratio: 0.1
