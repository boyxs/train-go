# interaction 集成测试配置（连本机测试库）

# 远程配置中心：本地起 etcd 测试用；不可达时降级走本地 yaml
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-interaction"
  type: "yaml"

http:
  addr: ":8040"

grpc:
  server:
    port: 8041
    name: "webook-interaction"
    ttl: 30
    weight: 10

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "localhost:4317"
  serviceName: "webook-interaction-test"
  serviceVersion: "0.1.0"
  env: "test"
  sampleRatio: 0.0
