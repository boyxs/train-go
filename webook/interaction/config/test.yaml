# interaction 集成测试配置（连本机测试库）。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-interaction"
  type: "yaml"

server:
  http:
    addr: ":8040" # 仅 /metrics+/health（非 gin，不挂超时中间件）
  grpc:
    addr: ":8041"
    name: "webook-interaction"
    ttl: 30s
    weight: 10
    host: "" # 空=自动探测出口 IP，k8s 填 POD_IP
    timeout: 5s

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-interaction-test"
  service_version: "0.1.0"
  env: "test"
  sample_ratio: 0.0
