# interaction dev 环境配置（同构 comment/config/dev.yaml）
# 差异点：otel.env=dev / sampleRatio=1.0 / logger debug 级 / 中间件用容器名
# 数据库与主仓共享同一份 webook 库（不分库），靠表名隔离

# 远程配置中心：与主仓共用 etcd 实例，path 独立（/webook-interaction 不踩 /webook）
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-interaction"
  type: "yaml"

http:
  addr: ":8040"

grpc:
  server:
    port: 8041
    name: "webook-interaction"
    ttl: 30
    weight: 10

mysql:
  dsn: 'root:13520@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC'

redis:
  addr: 'webook-redis:6379'
  password: '13520'

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "otel-collector:4317"
  serviceName: "webook-interaction"
  serviceVersion: "0.1.0"
  env: "dev"
  sampleRatio: 1.0
