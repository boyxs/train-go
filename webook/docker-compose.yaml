  #     - kafka-data:/bitnami/kafka
  #   networks:
  #     extnetwork:
  #       ipv4_address: 172.21.0.5

volumes:
  mysql-data:
  kafka-data:
  es-data:
  ollama-data:

networks:
  extnetwork:
    external: true
    name: extnetwork
    ipam:
      config:
        - subnet: 172.21.0.0/16
