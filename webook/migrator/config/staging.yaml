# migrator staging 环境配置。差异：otel.env=staging / sample_ratio=0.5 / logger info / partition_count=4。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-migrator"
  type: "yaml"

server:
  http:
    addr: ":8200"
    timeout: 15s
    jwt:
      disabled: false

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook_migrator?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

logger:
  level: info
  development: false
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-migrator"
  service_version: "0.1.0"
  env: "staging"
  sample_ratio: 0.5

migrator:
  full:
    batch_size: 1000
    channel_buf: 4096
  incr:
    batch_size: 100
    channel_buf: 4096
    partition_count: 4 # staging 模拟生产并发；与 Sink 连接池容量对齐
  verify:
    batch_size: 1000
    channel_buf: 4096
  canal:
    addr: "webook-mysql:3306"
    user: "canal"
    password: ${CANAL_PASS} # 自建中间件密码走 ${ENV}；local/test 明文，L2 剥 K8s Secret
    server_id_base: 2001
    flavor: "mysql"
  es:
    addrs:
      - "http://webook-es:9200"
    # username: ""
    # password: ""
