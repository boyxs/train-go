# migrator staging 环境配置（预发布）
# 差异点：otel.env=staging / sampleRatio=0.5 / logger info 级 / partitionCount=4 模拟生产并发
# 控制库独立：webook_migrator（与 webook / webook_chat 不分库共用 MySQL 实例，逻辑库隔离）

# 远程配置中心：与主仓共用 etcd 实例，path 独立
etcd:
  endpoint: "http://webook-etcd:2379"
  path: "/webook-migrator"
  type: "yaml"

http:
  addr: ":8083"

web:
  jwt:
    disabled: false

mysql:
  dsn: 'root:13520@tcp(webook-mysql:3306)/webook_migrator?parseTime=true&loc=UTC'

redis:
  addr: 'webook-redis:6379'
  password: '13520'

logger:
  level:
    l: 0
  development: false
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "otel-collector:4317"
  serviceName: "webook-migrator"
  serviceVersion: "0.1.0"
  env: "staging"
  sampleRatio: 0.5

# 表名 / PK 列从 task.TablesJSON 读取（创建 task 时配）
migrator:
  full:
    batchSize: 1000
    channelBuf: 4096
  incr:
    batchSize: 100
    channelBuf: 4096
    # staging 启用 partition 并行模拟生产；4 partition + Sink 连接池容量需对齐
    partitionCount: 4
  verify:
    batchSize: 1000
    channelBuf: 4096
  # cdc 增量订阅;staging 用 2001 段避免跟 dev/prod 撞 binlog 槽位
  canal:
    addr: "webook-mysql:3306"
    user: "canal"
    password: "canal"
    serverIdBase: 2001
    flavor: "mysql"
  es:
    addrs:
      - "http://webook-es:9200"
    # username: ""
    # password: ""
