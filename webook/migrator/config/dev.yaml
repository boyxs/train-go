# migrator dev 环境配置。差异：otel.env=dev / sample_ratio=1.0 / logger debug。控制库 webook_migrator。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-migrator"
  type: "yaml"

server:
  http:
    addr: ":8200"
    timeout: 15s
    jwt:
      disabled: false

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook_migrator?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-migrator"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0

migrator:
  full:
    batch_size: 1000
    channel_buf: 4096
  incr:
    batch_size: 100
    channel_buf: 4096
    partition_count: 1
    flush_interval: 1s
  verify:
    batch_size: 1000
    channel_buf: 4096
  canal:
    addr: "webook-mysql:3306"
    user: "canal"
    password: ${CANAL_PASS} # 自建中间件密码走 ${ENV}；local/test 明文，L2 剥 K8s Secret
    server_id_base: 1001 # dev 1001 段错开 staging(2001)/prod(3001)
    flavor: "mysql"
  es:
    addrs:
      - "http://webook-es:9200"
    # username: ""
    # password: ""
