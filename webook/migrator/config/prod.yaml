# migrator prod 环境配置
# 差异点：otel.env=prod / sampleRatio=0.1 / logger info 级 / partitionCount=8 真实生产并发
# 控制库独立：webook_migrator

# 远程配置中心：与主仓共用 etcd 实例，path 独立
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-migrator"
  type: "yaml"

http:
  addr: ":8083"

web:
  jwt:
    disabled: false

mysql:
  dsn: 'root:13520@tcp(webook-mysql:3306)/webook_migrator?parseTime=true&loc=UTC'

redis:
  addr: 'webook-redis:6379'
  password: '13520'

logger:
  level:
    l: 0
  development: false
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "otel-collector:4317"
  serviceName: "webook-migrator"
  serviceVersion: "0.1.0"
  env: "prod"
  sampleRatio: 0.1

# 表名 / PK 列从 task.TablesJSON 读取（创建 task 时配）
migrator:
  full:
    batchSize: 1000
    channelBuf: 4096
  incr:
    batchSize: 100
    channelBuf: 4096
    # prod 8 partition 满足大流量；上限受 Sink 连接池 + CPU 限制，跑前观察 webook_lock_* + DB conn 用量
    partitionCount: 8
  verify:
    batchSize: 1000
    channelBuf: 4096
  # cdc 增量订阅;prod 用 3001 段;实际 addr 部署时按 K8s service 或 cluster RW endpoint 配
  # 密码生产前剥到 K8s Secret 走 envFrom.secretRef + viper.BindEnv("migrator.canal.password", "CANAL_PASSWORD")
  canal:
    addr: "webook-mysql:3306"
    user: "canal"
    password: "canal"
    serverIdBase: 3001
    flavor: "mysql"
  es:
    addrs:
      - "http://webook-es:9200"
    # xpack.security 必填(生产)
    # username: ""
    # password: ""
