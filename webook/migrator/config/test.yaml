# migrator 集成测试配置（连本机测试库）
#
# 跑法：
#   1. 启动 docker compose（webook 仓库根目录 deploy/）确保 mysql / redis 起着
#   2. 手动建库：mysql -e "CREATE DATABASE IF NOT EXISTS webook_migrator_test CHARACTER SET utf8mb4 COLLATE utf8mb4_0900_ai_ci"
#   3. cd webook && go test ./migrator/integration/...

# 远程配置中心：本地起 etcd 测试用；不可达时降级走本地 yaml
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-migrator"
  type: "yaml"

http:
  addr: ":8030"

web:
  jwt:
    disabled: true

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook_migrator_test?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  disabled: true
  endpoint: "localhost:4317"
  serviceName: "webook-migrator-test"
  serviceVersion: "0.1.0"
  env: "test"
  sampleRatio: 0.0

migrator:
  full:
    batchSize: 100
    channelBuf: 1024
  incr:
    batchSize: 50
    channelBuf: 1024
    # 集成测试单 partition 跑（够用且测试更确定）
    partitionCount: 1
  verify:
    batchSize: 100
    channelBuf: 1024
  # canal_e2e_test 用;本机 docker mysql 需开 binlog + 建 canal 用户(deploy/mysql/init/01-canal-user.sql)
  # 用 serverIdBase=2001 错开 local.yaml(1001),避免本地 + 测试同时跑撞槽
  canal:
    addr: "localhost:3306"
    user: "canal"
    password: "canal"
    serverIdBase: 2001
    flavor: "mysql"
  # mongo_e2e_test 用：连本机 Mongo 副本集（root 认证；Change Stream 需副本集）。
  mongo:
    uri: "mongodb://root:13520@127.0.0.1:27017,127.0.0.1:27018/?replicaSet=rs0"
    database: "webook_migrator_test"
