# migrator 集成测试配置（连本机测试库 webook_migrator_test，需手动建库 + 开 binlog + canal 用户）。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-migrator"
  type: "yaml"

server:
  http:
    addr: ":8200"
    timeout: 15s
    jwt:
      disabled: true

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook_migrator_test?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  disabled: true
  endpoint: "localhost:4317"
  service_name: "webook-migrator-test"
  service_version: "0.1.0"
  env: "test"
  sample_ratio: 0.0

migrator:
  full:
    batch_size: 100
    channel_buf: 1024
  incr:
    batch_size: 50
    channel_buf: 1024
    partition_count: 1
    flush_interval: 1s
  verify:
    batch_size: 100
    channel_buf: 1024
  canal:
    addr: "localhost:3306"
    user: "canal"
    password: "canal"
    server_id_base: 2001 # 错开 local(1001)
    flavor: "mysql"
  mongo:
    uri: "mongodb://root:13520@127.0.0.1:27017,127.0.0.1:27018/?replicaSet=rs0"
    database: "webook_migrator_test"
