# migrator 本地配置（连本机中间件）。控制库独立 webook_migrator（逻辑库隔离）。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-migrator"
  type: "yaml"

server:
  http:
    addr: ":8200"
    timeout: 15s
    jwt:
      disabled: true # 本地无 core 签发 token，跳过 JWT 让 curl 直通

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook_migrator?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  disabled: true # 本地无 collector，用 noop tracer
  endpoint: "localhost:4317"
  service_name: "webook-migrator"
  service_version: "0.1.0"
  env: "local"
  sample_ratio: 1.0

# migrator.* 键 snake_case（pipeline 引擎 key，viper.GetInt 直接取键）；表名/PK 从 task.TablesJSON 读
migrator:
  full:
    batch_size: 1000
    channel_buf: 4096
  incr:
    batch_size: 100
    channel_buf: 4096
    partition_count: 1 # 默认单 worker；多核大流量按 CPU+Sink 池配 4/8/16
  verify:
    batch_size: 1000
    channel_buf: 4096
  canal:
    addr: "localhost:3306"
    user: "canal"
    password: "canal" # 自建中间件密码；L2 剥 K8s Secret + BindEnv
    server_id_base: 1001
    flavor: "mysql"
  es:
    addrs:
      - "http://localhost:9200"
    # 本地 docker ES 启动时关了 xpack.security 不需要;生产环境必填
    # username: "elastic"
    # password: ""
  # clickhouse:
  #   addr: "localhost:9000"
  #   database: "webook"
  #   user: "default"
  #   password: ""
  mongo:
    uri: "mongodb://root:13520@127.0.0.1:27017,127.0.0.1:27018/?replicaSet=rs0"
    database: "webook"
  # kafka:
  #   brokers:
  #     - "localhost:9092"
