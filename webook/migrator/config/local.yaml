# migrator 服务本地配置（连本机 docker compose 起的中间件）
# 控制库独立：webook_migrator（与 webook、webook_chat 不分库共用 MySQL 实例，逻辑库隔离）

# 远程配置中心：与主仓共用 etcd 实例，path 独立（/webook-migrator）
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-migrator"
  type: "yaml"

http:
  addr: ":8030"

# 本地无 webook-core 签发 token；跳过 JWT 让 curl 直接打通
web:
  jwt:
    disabled: true

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook_migrator?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  # 本地无 collector；设 disabled=true 用 noop tracer（不影响业务）
  disabled: true
  endpoint: "localhost:4317"
  serviceName: "webook-migrator"
  serviceVersion: "0.1.0"
  env: "local"
  sampleRatio: 1.0

# 表名 / PK 列从 task.TablesJSON 读取（创建 task 时配），yaml 不持表配置
migrator:
  full:
    batchSize: 1000
    channelBuf: 4096
  incr:
    batchSize: 100
    channelBuf: 4096
    # partition 并行：按 PK FNV-hash 分发到 N 个 worker；同 PK 始终落同 partition 保单行顺序。
    # 默认 1（单 worker）；多核 / 大流量场景按 CPU + Sink 连接池容量配 4 / 8 / 16。
    # 多 partition crash 恢复用 min(各 partition ckpt) 作 IncrSubscribe 起点 + Sink 幂等防重放副作用。
    partitionCount: 1
  verify:
    batchSize: 1000
    channelBuf: 4096
  # cdc 增量订阅(canal 直连 MySQL master 拉 binlog stream)
  # 要求:MySQL 开 binlog_format=ROW + binlog_row_image=FULL + server-id;canal 用户有 REPLICATION SLAVE 权限
  # 实际 ServerID = serverIdBase + task.Id(多 cdc task 错开避免撞槽)
  canal:
    addr: "localhost:3306"
    user: "canal"
    password: "canal"
    serverIdBase: 1001
    flavor: "mysql"
  # 异构 Sink 端点（按需添加；ioc.buildHeteroSink 按 task.SinkType 分发）
  # 本地启动 docker container 后填入对应地址；未配置时 sinkType=es/ck/mongo/kafka 的任务启动会失败
  es:
    addrs:
      - "http://localhost:9200"
    # 本地 docker ES 启动时关了 xpack.security 不需要;生产环境必填
    # username: "elastic"
    # password: ""
  # clickhouse:
  #   addr: "localhost:9000"
  #   database: "webook"
  #   user: "default"
  #   password: ""
  mongo:
    uri: "mongodb://root:13520@127.0.0.1:27017,127.0.0.1:27018/?replicaSet=rs0"
    database: "webook"
  # kafka:
  #   brokers:
  #     - "localhost:9092"
