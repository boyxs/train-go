# chat dev 环境配置（容器名连中间件）。差异：otel.env=dev / sample_ratio=1.0 / logger debug。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-chat"
  type: "yaml"

server:
  http:
    addr: ":8020"
    timeout: 15s # 请求超时；SSE /chat 前缀豁免（见 ioc/web.go）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s
    # kimi 仅 dev：多配一个 provider 专门测 TimeoutFailover 主备切换
    - name: kimi
      api_key: ${KIMI_API_KEY}
      base_url: "https://api.moonshot.cn/v1"
      model: "kimi-k2.5"
      max_tokens: 2048
      timeout: 60s

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-chat"
  service_version: "0.1.0"
  env: "dev"
  sample_ratio: 1.0
