# chat prod 环境配置。差异：otel.env=prod / sample_ratio=0.1 / logger info。
etcd:
  endpoints:
    - "http://webook-etcd:2379"
  path: "/webook-chat"
  type: "yaml"

server:
  http:
    addr: ":8020"
    timeout: 15s # 请求超时；SSE /chat 前缀豁免（见 ioc/web.go）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:${MYSQL_PASS}@tcp(webook-mysql:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "webook-redis:6379"
    password: ${REDIS_PASS}

llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s

logger:
  level: info
  development: false
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "otel-collector:4317"
  service_name: "webook-chat"
  service_version: "0.1.0"
  env: "prod"
  sample_ratio: 0.1
