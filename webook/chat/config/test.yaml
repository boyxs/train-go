# chat 集成测试配置（连本机测试库）。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-chat"
  type: "yaml"

server:
  http:
    addr: ":8020"
    timeout: 15s # 请求超时；SSE /chat 前缀豁免（见 ioc/web.go）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

# 测试用假 key（非真实凭据，无需 ${ENV}）
llm:
  providers:
    - name: deepseek
      api_key: "sk-test-fake"
      base_url: "http://localhost:9999"
      model: "deepseek-chat"
      max_tokens: 256
      timeout: 5s

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-chat-test"
  service_version: "0.1.0"
  env: "test"
  sample_ratio: 0.0
