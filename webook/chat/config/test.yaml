# chat 集成测试配置（连本机测试库）

# 远程配置中心：本地起 etcd 测试用；不可达时降级走本地 yaml
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-chat"
  type: "yaml"

http:
  addr: ":8189"

grpc:
  client:
    webook-core:
      target: "etcd:///service/webook-core"
#      secure: false
#      caFile: ""

mysql:
  dsn: root:13520@tcp(localhost:3306)/webook_test?parseTime=true&loc=UTC

redis:
  addr: 127.0.0.1:6379
  password: "13520"

# JWT 验签密钥写死在 chat/consts/auth.go，与主仓 internal/consts/auth.go 同源（不读 yaml）
llm:
  providers:
    - name: deepseek
      apiKey: "sk-test-fake"
      baseUrl: "http://localhost:9999"
      model: "deepseek-chat"
      maxTokens: 256
      timeout: 5

logger:
  level:
    l: -1
  development: true
  encoding: 'json'
  outputPaths: [ 'stdout' ]
  errorOutputPaths: [ 'stderr' ]

otel:
  endpoint: "localhost:4317"
  serviceName: "webook-chat-test"
  serviceVersion: "0.1.0"
  env: "test"
  sampleRatio: 0.0
