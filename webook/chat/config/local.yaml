# chat 本地配置（连本机 docker compose 中间件）。数据库与主仓共用（不分库），表 chat_conversation / chat_message。
etcd:
  endpoints:
    - "http://127.0.0.1:2379"
  path: "/webook-chat"
  type: "yaml"

server:
  http:
    addr: ":8020"
    timeout: 15s # 请求超时；SSE /chat 前缀豁免（见 ioc/web.go）

client:
  grpc:
    webook-core:
      target: "etcd:///service/webook-core"
      balancer: "breaker_swrr"
      # ── 可选项：去掉行首 # 即启用（完整说明见 prd/config/config-architecture.md）──
      # secure: false                  # true → TLS 传输
      # ca_file: ""                    # secure=true 时验签 CA 路径；空=系统根证书
      # timeout: 3s                    # 单次调用超时；须 < 上游 server.grpc.timeout；非幂等写慎设
      # max_recv_msg_size: 4194304     # 收消息上限（字节）；0=库默认 4MB
      # max_send_msg_size: 0           # 发消息上限（字节）；0=库默认不限
      # health_check: false            # true=开健康检查（要求服务端已注册 grpc health service）
      # keep_alive:                    # 长连接保活；time<=0 关闭整段
      #   time: 30s                    #   ping 间隔
      #   timeout: 10s                 #   ping 应答超时
      #   permit_without_stream: false #   无活跃流也 ping
      # retry:                         # 存在即启用；须过幂等/熔断/观测评审
      #   max_attempts: 3              #   总尝试次数 ∈ [2,5]（grpc-go 硬上限 5）
      #   initial_backoff: 100ms
      #   max_backoff: 1s
      #   backoff_multiplier: 2
      #   retryable_codes: [UNAVAILABLE] #   触发重试的 gRPC 状态码名
      #   methods: []                  #   pkg.Service 或 pkg.Service/Method；空=所有方法
    webook-interaction:
      target: "etcd:///service/webook-interaction"
      balancer: "breaker_swrr"
    webook-search:
      target: "etcd:///service/webook-search"
      balancer: "breaker_swrr"

data:
  mysql:
    dsn: root:13520@tcp(localhost:3306)/webook?parseTime=true&loc=UTC
  redis:
    addr: "127.0.0.1:6379"
    password: "13520"

# LLM provider（键名 snake_case，绑 pkg/llm.ProviderConfig 的 mapstructure tag；api_key 走 ${ENV} 不进 git）
llm:
  providers:
    - name: deepseek
      api_key: ${DEEPSEEK_API_KEY}
      base_url: "https://api.deepseek.com"
      model: "deepseek-chat"
      max_tokens: 2048
      timeout: 60s

logger:
  level: debug
  development: true
  encoding: json
  output_paths: [ stdout ]
  error_output_paths: [ stderr ]

otel:
  endpoint: "localhost:4317"
  service_name: "webook-chat"
  service_version: "0.1.0"
  env: "local"
  sample_ratio: 1.0
