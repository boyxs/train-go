# ── upstream ─────────────────────────────────────────────
upstream webook_backend {
    server webook:8089 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream webook_frontend {
    server webook-fe:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ── 公共代理参数 ────────────────────────────────────────
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

server {
    listen      80 default_server;
    server_name _;   # 通配：任意 Host 都命中；上线换真实域名只改这行

    # 安全响应头
    add_header X-Content-Type-Options nosniff           always;
    add_header X-Frame-Options        SAMEORIGIN        always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header X-XSS-Protection       "1; mode=block"   always;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # /api → 后端（剥前缀）
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://webook_backend/;
    }

    location = /api/user/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://webook_backend/user/login;
    }

    # SSE 流式
    location ~ ^/api/(chat/message/(stream|resume))$ {
        proxy_pass http://webook_backend/$1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # 后端 metrics：仅内网
    location = /metrics {
        allow 172.16.0.0/12;       # docker bridge 默认网段
        allow 192.168.0.0/16;      # 局域网
        allow 127.0.0.1;
        deny all;
        proxy_pass http://webook_backend/metrics;
    }

    # Next.js 静态资源长缓存
    location /_next/static/ {
        proxy_pass http://webook_frontend;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff           always;
        add_header X-Frame-Options        SAMEORIGIN        always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header X-XSS-Protection       "1; mode=block"   always;
    }

    location /static/ {
        proxy_pass http://webook_frontend;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options nosniff           always;
        add_header X-Frame-Options        SAMEORIGIN        always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header X-XSS-Protection       "1; mode=block"   always;
    }

    # 前端
    location / {
        proxy_pass http://webook_frontend;
    }
}
