# webook 日志管道：Filebeat → 解析 Zap ECS JSON → 脱敏 → ES(logs-webook-*)。
# 通用于 dev/staging/prod：日志级别由各服务 config 的 logger.level 控制（prod=info 本就不产 debug），管道不按级别过滤。
input {
  beats { port => 5044 }
}

filter {
  # 非 JSON（gin 默认日志 / panic / 偶发非结构化输出）不是应用 ECS 日志 → 丢弃降噪
  if [message] !~ /^\s*\{/ {
    drop { }
  }

  # Zap 的 @timestamp 是毫秒 epoch：先抽到 @metadata（避开 Logstash 保留 @timestamp），再解析 JSON
  grok {
    match          => { "message" => "\"@timestamp\":%{NUMBER:[@metadata][ts_ms]}" }
    tag_on_failure => []
  }
  json {
    source               => "message"
    skip_on_invalid_json => true
  }

  # 健康检查 / 指标抓取的 access log 不入库
  if [url][path] in ["/health", "/healthz", "/metrics"] {
    drop { }
  }

  # 用毫秒 epoch 覆盖 @timestamp（直接解析文档里数字型 @timestamp 会 _dateparsefailure）
  if [@metadata][ts_ms] {
    date {
      match  => ["[@metadata][ts_ms]", "UNIX_MS"]
      target => "@timestamp"
    }
  }

  # 脱敏兜底：password/token/authorization/secret 值打码
  mutate {
    gsub => ["message", "(?i)((?:password|token|authorization|secret)\"?\s*[:=]\s*\"?)[^\",}\s]+", "\1***"]
  }

  # service.name 兜底：app 未带时用容器名
  if ![service][name] and [container][name] {
    mutate { copy => { "[container][name]" => "[service][name]" } }
  }
}

output {
  elasticsearch {
    hosts    => ["${LOGSTASH_ES_SCHEME:http}://webook-es:9200"]
    user     => "elastic"
    password => "${ES_PASS}"
    # TLS：staging/prod 建议开启 —— 置 LOGSTASH_ES_SSL_ENABLED=true + LOGSTASH_ES_SCHEME=https。
    ssl_enabled => "${LOGSTASH_ES_SSL_ENABLED:false}"
    # ES 用私有/自签 CA 时：CA 挂进容器 + 设 LOGSTASH_ES_CA_FILE，并取消下一行注释
    # （默认注释：空路径会让 Logstash 启动期 :path 校验失败，即使 SSL 关也一样）
    # ssl_certificate_authorities => ["${LOGSTASH_ES_CA_FILE}"]
    index           => "logs-webook-%{+YYYY.MM.dd}"
    manage_template => false   # 模板/ILM 真相源在 setup.sh
  }
}
