# webook 日志管道：Filebeat(beats) → 解析 ECS JSON → 降噪/脱敏 → Elasticsearch(webook-logs-*)
input {
  beats {
    port => 5044
  }
}

filter {
  # 应用日志 message 是 Zap ECS JSON 串 → 解析进事件顶层（@timestamp/log.level/trace.id/service.name…）
  if [message] =~ /^\s*\{/ {
    # 先从原始 JSON 串抽出毫秒 epoch 到 @metadata（不入库、不撞 Logstash 保留字段），供下方 date 覆盖 @timestamp。
    # 抽不到（格式变动）时 tag_on_failure=[] 静默跳过 → @timestamp 保持原值，只改进不回退。
    grok {
      match          => { "message" => "\"@timestamp\":%{NUMBER:[@metadata][ts_ms]}" }
      tag_on_failure => []
    }
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # 降噪：健康检查 / 指标抓取的 access log 不入库
  if [url][path] in ["/health", "/healthz", "/metrics"] {
    drop { }
  }

  # @metadata.ts_ms 是 epoch_millis（Zap EpochMillisTimeEncoder，对齐项目 int64 毫秒）→ 覆盖事件 @timestamp。
  # 不直接 date 解析 message 里数字型的 @timestamp：数字无法强转 Logstash 保留字段的 Timestamp，
  # 会 _dateparsefailure 且把 @timestamp 重置为入库时间（丢真实日志时间）。
  if [@metadata][ts_ms] {
    date {
      match  => ["[@metadata][ts_ms]", "UNIX_MS"]
      target => "@timestamp"
    }
  }

  # 脱敏兜底：message 里的 password/token/authorization/secret 值打码（app 侧不应打，双保险）
  mutate {
    gsub => [
      "message", "(?i)((?:password|token|authorization|secret)\"?\s*[:=]\s*\"?)[^\",}\s]+", "\1***"
    ]
  }

  # service.name 兜底：app 未带时用容器名（正常都有，兜异常/nginx 等）
  if ![service][name] and [container][name] {
    mutate { copy => { "[container][name]" => "[service][name]" } }
  }
}

output {
  elasticsearch {
    hosts    => ["http://webook-es:9200"]
    user     => "elastic"
    password => "${ES_PASS}"
    # 按天分索引 webook-logs-YYYY.MM.dd；ECS 模板 + N 天后删由 deploy/elk/es/setup.sh 建的 ILM 管理
    index           => "webook-logs-%{+YYYY.MM.dd}"
    manage_template => false      # 模板/ILM 单一真相源在 setup.sh，避免 Logstash 版本差异
  }
}
