# webook 日志管道：Filebeat(beats) → 解析 ECS JSON → 降噪/脱敏 → Elasticsearch(logs-webook-*)
input {
  beats {
    port => 5044
  }
}

filter {
  # 非 JSON（中间件原始 stdout / gin 默认日志等）不是应用 ECS 日志 → 直接丢，降噪省存储。
  # 用原始 message 正则判定（json 解析后 message 会被内层日志文本覆盖，届时判不准）。
  if [message] !~ /^\s*\{/ {
    drop { }
  }
  # debug 级只留容器 stdout、不进 ES（ELK 只存 info+ 运维日志）；正则匹配原始串，避开点号字段引用歧义。
  if [message] =~ /"log\.level":"[Dd]ebug"/ {
    drop { }
  }

  # 应用日志 message 是 Zap ECS JSON 串 → 解析进事件顶层（@timestamp/log.level/trace.id/service.name…）
  if [message] =~ /^\s*\{/ {
    # 抽毫秒 epoch 到 @metadata（不入库、不撞保留 @timestamp），供下方 date 覆盖；抽不到 fail-safe 保持原值
    grok {
      match          => { "message" => "\"@timestamp\":%{NUMBER:[@metadata][ts_ms]}" }
      tag_on_failure => []
    }
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }

  # 降噪：健康检查 / 指标抓取的 access log 不入库
  if [url][path] in ["/health", "/healthz", "/metrics"] {
    drop { }
  }

  # 用 @metadata.ts_ms(epoch_millis) 覆盖 @timestamp；不直接解析文档里数字型 @timestamp（撞保留字段会 _dateparsefailure）
  if [@metadata][ts_ms] {
    date {
      match  => ["[@metadata][ts_ms]", "UNIX_MS"]
      target => "@timestamp"
    }
  }

  # 脱敏兜底：message 里的 password/token/authorization/secret 值打码（app 侧不应打，双保险）
  mutate {
    gsub => [
      "message", "(?i)((?:password|token|authorization|secret)\"?\s*[:=]\s*\"?)[^\",}\s]+", "\1***"
    ]
  }

  # service.name 兜底：app 未带时用容器名（正常都有，兜异常/nginx 等）
  if ![service][name] and [container][name] {
    mutate { copy => { "[container][name]" => "[service][name]" } }
  }
}

output {
  elasticsearch {
    hosts    => ["http://webook-es:9200"]
    user     => "elastic"
    password => "${ES_PASS}"
    # 按天分索引 logs-webook-YYYY.MM.dd（走 logs-* 命名空间，Kibana「All logs」默认 data view
    # logs-*-*,logs-*,filebeat-* 能直接筛到）；ECS 模板 + N 天后删由 deploy/elk/es/setup.sh 建的 ILM 管理
    index           => "logs-webook-%{+YYYY.MM.dd}"
    manage_template => false      # 模板/ILM 单一真相源在 setup.sh，避免 Logstash 版本差异
  }
}
