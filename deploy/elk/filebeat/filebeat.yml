# Filebeat 9.x —— 采集所有 webook-* 容器 stdout（Docker json-file），转发 Logstash。
# 只读挂载 /var/lib/docker/containers + docker.sock（见 docker-compose）；容器内以 root 跑 + -strict.perms=false。
filebeat.inputs:
  - type: filestream
    id: webook-container-logs
    paths:
      - /var/lib/docker/containers/*/*.log
    parsers:
      - container: ~          # 解 Docker json-file 外层，取出应用写的日志行到 message
    prospector.scanner.symlinks: true

processors:
  - add_docker_metadata:
      host: "unix:///var/run/docker.sock"
  # 只采 Go 业务服务容器（这些才产 ECS JSON + trace.id）；中间件/nginx/fe/ELK 自身不采，
  # 免非应用的原始 stdout 刷爆日志索引（新增业务服务记得加进下面白名单）
  - drop_event:
      when:
        not:
          regexp:
            container.name: "^webook-(core|chat|comment|interaction|relation|tag|search|worker|migrator)$"

# 应用 message 是 Zap ECS JSON 串 —— 统一交给 Logstash 解析（单一解析点，不在两处 decode）
output.logstash:
  hosts: ["webook-logstash:5044"]

logging.level: info
logging.to_stderr: true
