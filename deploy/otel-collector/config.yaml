# OpenTelemetry Collector 配置（contrib 0.105.0）
# 流向：webook (OTLP/gRPC) → 本 Collector → Zipkin（同 project 内 service name DNS）

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # 限制内存避免 OOM（docker-compose mem_limit 256MiB，给 runtime 留 ~80MiB）
  memory_limiter:
    check_interval: 1s
    limit_mib: 150
    spike_limit_mib: 30
  # 攒批降低后端压力
  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024
  # ── 中间件依赖节点：派生 peer.service ─────────────────────────────
  # Zipkin Dependencies 靠 client span 的 remoteEndpoint.serviceName 画外部节点，该字段由
  # OTel→Zipkin exporter 从 peer.service 填。中间件 client span 只带 db.system / messaging.system，
  # 没人打 peer.service，这里按语义约定通配键补上——未来新接 DB/MQ/HTTP 自动覆盖。
  # 局限：只提升「已有 span」为节点；未埋点的 client（当前 ES/etcd/LLM 不发 span）需先在应用侧加 otel。
  transform/peer_service:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # DB/缓存：db.system.name 是 semconv≥1.30 新约定（gorm→mysql/pg/clickhouse），
          #          db.system 是旧约定（redisotel→redis、老 es/mongo 库）——两套并存，都覆盖。
          - set(attributes["peer.service"], attributes["db.system.name"]) where attributes["db.system.name"] != nil
          - set(attributes["peer.service"], attributes["db.system"]) where attributes["peer.service"] == nil and attributes["db.system"] != nil
          # MQ：messaging.system 是标准 key（kafka/rabbitmq/nats…）；messaging 未像 db 改名，无 .name 变体。
          - set(attributes["peer.service"], attributes["messaging.system"]) where attributes["peer.service"] == nil and attributes["messaging.system"] != nil
          # 兜底：纯外部 HTTP（无 db/mq/rpc system，如未来 LLM），按主机名建节点；
          #       rpc.system 守卫排除服务间 gRPC（两端都发 span 已成图，勿重复建节点）。
          - set(attributes["peer.service"], attributes["server.address"]) where attributes["peer.service"] == nil and attributes["rpc.system"] == nil and attributes["server.address"] != nil
          - set(attributes["peer.service"], attributes["net.peer.name"]) where attributes["peer.service"] == nil and attributes["rpc.system"] == nil and attributes["net.peer.name"] != nil

exporters:
  zipkin:
    # 用 container_name（也是 service name），同 project DNS 解析更明确
    endpoint: http://webook-zipkin:9411/api/v2/spans
    tls:
      insecure: true
    # ── Collector → Zipkin 链路容灾 ─────────────────────────────────
    # zipkin 短暂不可达 / collector 重启时不丢 span：
    # 1. sending_queue：缓冲区，溢出才 drop；storage 引用 file_storage 持久化到 volume
    # 2. retry_on_failure：指数退避重试，最多 5 分钟（之后丢弃，避免无限堆积）
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 5000
      storage: file_storage
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 5m
  # 调试用：把 span 同时打到 collector 自己日志（verbosity=basic 只打计数，detailed 打每条 span 详情）
  debug:
    verbosity: basic

extensions:
  # /healthz 端点
  health_check:
    endpoint: 0.0.0.0:13133
  # 持久化 sending_queue 到本地磁盘（docker-compose 挂 named volume 跨重启保留）
  # zipkin 抖动 / collector 重启都能续传，不丢已收 span
  file_storage:
    directory: /var/lib/otelcol/storage
    timeout: 1s
    compaction:
      directory: /var/lib/otelcol/storage
      on_start: true

service:
  extensions: [health_check, file_storage]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform/peer_service, batch]
      exporters: [zipkin, debug]
  telemetry:
    logs:
      level: info
    metrics:
      # 自监控指标：otelcol_receiver_accepted_spans / otelcol_exporter_sent_spans / queue_size ...
      address: 0.0.0.0:8888
