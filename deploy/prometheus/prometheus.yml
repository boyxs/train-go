global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # 由 .env.<env> 的 DEPLOY_ENV 透传到 webook 应用、otel trace；
  # prometheus 配置是静态文件，需要 env 区分指标时手动改或用 file_sd_configs
  external_labels:
    cluster: "webook"

# Recording Rules 目录（项目用 Grafana Alerting，Prometheus 这边只放预计算规则）
# 空目录时 Prometheus 也能正常跑，不报错
rule_files:
  - /etc/prometheus/rules/*.rules.yml

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # webook-core 主仓服务
  - job_name: 'webook-core'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-core:8010']

  # webook-chat 微服务
  - job_name: 'webook-chat'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-chat:8020']

  # webook-comment 微服务
  - job_name: 'webook-comment'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-comment:8030']

  # webook-interaction 微服务
  - job_name: 'webook-interaction'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-interaction:8040']

  # webook-relation 微服务
  - job_name: 'webook-relation'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-relation:8060']

  # webook-tag 微服务（标签，MySQL）
  - job_name: 'webook-tag'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-tag:8070']

  # webook-search 微服务（ES + embedding 检索）
  - job_name: 'webook-search'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-search:8080']

  # webook-worker 调度器（cron 定时任务 + Kafka 消费者）
  - job_name: 'webook-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-worker:8050']

  # webook-migrator 控制台（运维段 :8200，与业务 80xx 段错开）
  - job_name: 'webook-migrator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['webook-migrator:8200']

  # MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['webook-mysqld-exporter:9104']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['webook-redis-exporter:9121']

  # Kafka
  - job_name: 'kafka'
    static_configs:
      - targets: ['webook-kafka-exporter:9308']

  # 宿主机（Node Exporter）
  - job_name: 'node'
    static_configs:
      - targets: ['webook-node-exporter:9100']

  # Grafana 自监控：/metrics 部分版本默认要 basic auth，显式带上避免 401
  # 凭证与 .env.<env> 的 GRAFANA_USER/GRAFANA_PASS 一致（Prometheus YAML 不展开 env，写死）
  - job_name: 'grafana'
    basic_auth:
      username: admin
      password: admin
    static_configs:
      - targets: ['webook-grafana:3000']

  # OTel Collector 自监控（需在 collector config 里 telemetry.metrics.address 暴露）
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['webook-otel-collector:8888']

  # Zipkin 自监控（micrometer 暴露在 /prometheus；slim 版无此端点）
  - job_name: 'zipkin'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['webook-zipkin:9411']
