# Prometheus Recording Rules：webook 后台任务 (cron + 锁) 指标预计算。校验 promtool check rules。
# NaN 守卫：无活动时 0/0 比率与空 histogram_quantile 会产 NaN 误告警，
# 统一 `分母 >0` / `and (观测计数 >0)` 让无数据时不出序列。
groups:

  - name: webook-jobs-cron-recording
    interval: 30s
    rules:

      # 任务成功率（分母 >0 守卫）
      - record: webook:cron_success_rate:rate5m
        expr: |
          sum by (task) (rate(webook_cron_runs_total{result="success"}[5m]))
          /
          (sum by (task) (rate(webook_cron_runs_total[5m])) > 0)

      # 任务耗时分位（尾部 and 守卫空数据 NaN）
      - record: webook:cron_duration_p50:rate5m
        expr: |
          histogram_quantile(0.50,
            sum by (task, le) (rate(webook_cron_duration_seconds_bucket[5m]))
          )
          and on (task) (sum by (task) (rate(webook_cron_duration_seconds_count[5m])) > 0)

      - record: webook:cron_duration_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (task, le) (rate(webook_cron_duration_seconds_bucket[5m]))
          )
          and on (task) (sum by (task) (rate(webook_cron_duration_seconds_count[5m])) > 0)

      - record: webook:cron_duration_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (task, le) (rate(webook_cron_duration_seconds_bucket[5m]))
          )
          and on (task) (sum by (task) (rate(webook_cron_duration_seconds_count[5m])) > 0)

      # 距上次成功的滞后秒数（time()-vector，无 metric 返空，不产 NaN）
      - record: webook:cron_last_success_age:seconds
        expr: time() - webook_cron_last_success_timestamp

  - name: webook-jobs-lock-recording
    interval: 30s
    rules:

      # 抢锁错误率（分母 >0 守卫）
      - record: webook:lock_acquire_error_rate:rate5m
        expr: |
          sum(rate(webook_lock_acquire_total{result="error"}[5m]))
          /
          (sum(rate(webook_lock_acquire_total[5m])) > 0)

      # Lock() 等待 P99（尾部 and 守卫空数据 NaN）
      - record: webook:lock_wait_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(webook_lock_wait_seconds_bucket[5m]))
          )
          and (sum(rate(webook_lock_wait_seconds_count[5m])) > 0)

      # 锁持有 P99（尾部 and 守卫空数据 NaN）
      - record: webook:lock_held_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(webook_lock_held_seconds_bucket[5m]))
          )
          and (sum(rate(webook_lock_held_seconds_count[5m])) > 0)
