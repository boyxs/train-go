# Prometheus Recording Rules：webook-* 服务级 HTTP 指标按 job 维度预聚合
#
# 加载路径：prometheus.yml rule_files: /etc/prometheus/rules/*.rules.yml
# 校验：promtool check rules webook-services.rules.yml
#
# 与 webook-jobs.rules.yml 区别：
#   webook-jobs       → cron / lock 系统级，只 webook-core 上报，不分 service 维度
#   webook-services   → HTTP 业务级，所有 webook-* 服务都上报，by (job) 拆分对比
#
# Dashboard / Alerting 直接读这些 record（避免每次刷新重算 histogram_quantile，省 Prometheus CPU）。
groups:

  - name: webook-services-http-recording
    interval: 30s
    rules:

      # 服务级 QPS（按 job 拆分；加新服务自动跟进）
      - record: webook:http_qps:rate5m
        expr: sum by (job) (rate(webook_http_requests_total[5m]))

      # 服务级 5xx 错误率
      - record: webook:http_5xx_rate:rate5m
        expr: |
          sum by (job) (rate(webook_http_requests_total{status=~"5.."}[5m]))
          /
          sum by (job) (rate(webook_http_requests_total[5m]))

      # 服务级 P50/P95/P99 延迟（dashboard 三档同时读）
      - record: webook:http_duration_p50:rate5m
        expr: |
          histogram_quantile(0.50,
            sum by (job, le) (rate(webook_http_requests_duration_seconds_bucket[5m]))
          )

      - record: webook:http_duration_p95:rate5m
        expr: |
          histogram_quantile(0.95,
            sum by (job, le) (rate(webook_http_requests_duration_seconds_bucket[5m]))
          )

      - record: webook:http_duration_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(webook_http_requests_duration_seconds_bucket[5m]))
          )

      # 服务级活跃请求 in-flight（instant gauge，by job 即可，无需 rate）
      - record: webook:http_in_flight
        expr: sum by (job) (webook_http_requests_in_flight)
