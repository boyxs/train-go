# ═════════════════════════════════════════════════════════════════
# Relabel 详解
#
# relabel_configs 在抓取**之前**对 target 的 label 做改写；
# metric_relabel_configs 在抓取**之后**对每个 sample 的 label 做改写。
#
# 语法：
#   - source_labels: [label1, label2]   # 从哪些 label 取值（用分号连接成字符串）
#     separator: ';'                    # 连接符
#     regex: '(.+);(.+)'                # 匹配这个正则（整串）
#     target_label: new_label           # 写到哪个 label
#     replacement: '$1-$2'              # 写入什么值（可用 $1/$2 反引用）
#     action: replace|keep|drop|labelmap|labelkeep|labeldrop|hashmod|...
#
# 常见 action：
#   replace    改写 label（最常用）
#   keep       只保留匹配 regex 的 target
#   drop       丢弃匹配 regex 的 target
#   labelmap   按 regex 把匹配的 label 名批量改写
#   labelkeep  只保留匹配 regex 的 label
#   labeldrop  丢弃匹配 regex 的 label
#   hashmod    按 hash 分片（用于多 Prom 横向扩展）
#
# 常见元 label（Prom 抓前添加）：
#   __address__         target 地址
#   __scheme__          http / https
#   __metrics_path__    /metrics 路径
#   __param_<name>      URL 查询参数
#   __meta_<sd>_*       服务发现添加的元 label
# ═════════════════════════════════════════════════════════════════
