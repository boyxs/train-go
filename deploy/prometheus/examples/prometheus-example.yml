# ═══════════════════════════════════════════════════════════════
# prometheus.yml  Prometheus 主配置
#
# 文档：https://prometheus.io/docs/prometheus/latest/configuration/configuration/
# 生效：docker compose restart prometheus（或 curl -X POST /-/reload，需启 --web.enable-lifecycle）
# ═══════════════════════════════════════════════════════════════

# ─── global：全局默认值（单个 scrape 可覆盖）───────────────────────
global:
  scrape_interval: 15s              # 抓取周期；业务指标常 15s，基础设施可放宽到 30s/1m
  scrape_timeout: 10s               # 单次抓取超时（必须 ≤ scrape_interval）
  evaluation_interval: 15s          # 告警规则 / recording rules 评估周期
  # 所有指标附加的 label（用于多集群 / 多环境区分）
  external_labels:
    cluster: webook-dev
    replica: prom-0
  # 查询日志（慢查询定位）
  # query_log_file: /var/log/prometheus/queries.log

# ─── alerting：Alertmanager 对接（Grafana 用 Grafana Alerting 则可省）─
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']
#       scheme: http
#       timeout: 10s
#       api_version: v2

# ─── rule_files：Recording / 告警规则文件（glob 支持）─────
# 项目用 Grafana Alerting，此处只放 Recording rules（PromQL 预计算）。
# 实际生效见 deploy/prometheus/rules/webook-jobs.rules.yml
# 模板参考 prometheus/examples/recording-rules-example.yml（推荐）
#         或 prometheus/examples/alerts-example.yml（Alertmanager 路径，仅学习用）
rule_files:
  - "rules/*.rules.yml"

# ─── scrape_configs：抓取目标（核心）───────────────────────────
scrape_configs:

  # ─── Prometheus 自监控 ─────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── Go 应用（最常见）─────────────────────────────────────
  - job_name: 'webook-core'
    metrics_path: '/metrics'         # 默认就是 /metrics，显式写便于一眼识别
    scrape_interval: 15s             # 覆盖 global
    scrape_timeout: 10s
    honor_labels: false              # true=应用自带 label 优先；false=Prom 加的 label 优先
    honor_timestamps: true
    scheme: http                     # http / https
    static_configs:
      - targets:
          - 'webook:8010'            # 容器名:端口（docker 网络内）
        labels:
          env: dev
          service: webook
          tier: backend

    # 抓取前重写 labels（见下方"Relabel 详解"）
    relabel_configs: []
    # 抓取后过滤/改写指标（避免高基数）
    metric_relabel_configs:
      # 示例：丢弃某类指标减 Prom 压力
      # - source_labels: [__name__]
      #   regex: 'go_gc_duration_seconds.*'
      #   action: drop

    # HTTP 请求附加（需要鉴权时）
    # basic_auth:
    #   username: metrics
    #   password_file: /etc/prometheus/metrics_pw
    # authorization:
    #   type: Bearer
    #   credentials_file: /etc/prometheus/token
    # tls_config:
    #   insecure_skip_verify: true

    # 连接 Proxy
    # proxy_url: http://proxy.internal:3128

  # ─── 多实例（负载均衡的应用）──────────────────────────────
  - job_name: 'webook-cluster'
    static_configs:
      - targets:
          - 'webook-1:8010'
          - 'webook-2:8010'
          - 'webook-3:8010'
        labels: { env: prod, service: webook }

  # ─── MySQL / Redis / Kafka Exporter（已有 exporter 暴露 /metrics）──
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    # 给不同主机加 hostname label
    # relabel_configs:
    #   - source_labels: [__address__]
    #     regex: '([^:]+).*'
    #     target_label: host
    #     replacement: '$1'

  # ─── 文件 SD（运维加机器时改 YAML 即可，不用重启 Prom）────
