## 本地开发版（Prometheus 二进制跑在宿主机 Windows，目标走 localhost）
## 用法：prometheus.exe --config.file=prometheus/prometheus.local.yml
## 只采集 webook 应用指标，不含 exporter
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # 由 .env.<env> 的 DEPLOY_ENV 透传到 webook 应用、otel trace；
  # prometheus 配置是静态文件，需要 env 区分指标时手动改或用 file_sd_configs
  external_labels:
    cluster: "webook"

# Recording Rules 目录（项目用 Grafana Alerting，Prometheus 这边只放预计算规则）
# 空目录时 Prometheus 也能正常跑，不报错
rule_files:
  - rules/*.rules.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # webook-core 主仓服务（本地通过 localhost 访问）
  - job_name: 'webook-core'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8010']

  # webook-chat 微服务
  - job_name: 'webook-chat'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8020']

  # webook-comment 微服务
  - job_name: 'webook-comment'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8030']

  # webook-interaction 微服务
  - job_name: 'webook-interaction'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8040']

  # webook-relation 微服务
  - job_name: 'webook-relation'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8060']

  # webook-tag 微服务（标签，MySQL）
  - job_name: 'webook-tag'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8070']

  # webook-search 微服务（ES + embedding 检索）
  - job_name: 'webook-search'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8080']

  # webook-worker 调度器
  - job_name: 'webook-worker'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8050']

  # webook-migrator 控制台（运维段 :8200，与业务 80xx 段错开）
  - job_name: 'webook-migrator'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:8200']

  # OTel Collector 自监控（需在 collector config 里 telemetry.metrics.address 暴露）
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['127.0.0.1:8888']

  # Zipkin 自监控（micrometer 暴露在 /prometheus；slim 版无此端点）
  - job_name: 'zipkin'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['127.0.0.1:9411']
