apiVersion: 1

# webook-migrator 服务级告警（镜像 webook-chat.yml，job filter 限定到 webook-migrator）
# metric 命名空间统一为 webook_*，service 区分靠 prometheus 自动注入的 job 标签
groups:
  - orgId: 1
    name: webook-migrator
    folder: Webook
    interval: 1m
    rules:

      # ── ① 服务存活 ────────────────────────────────────────
      - uid: webook-migrator-up
        title: Webook Migrator 服务不可达
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Webook Migrator 实例 {{ $labels.instance }} 不可达"
          runbook_url: "https://wiki.internal/runbook/migrator-service-down"
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'up{job="webook-migrator"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      # ── ② HTTP 5xx 错误率 ─────────────────────────────────
      - uid: webook-migrator-5xx-rate
        title: Migrator HTTP 5xx 错误率 > 1%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Migrator 5xx 错误率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/migrator-5xx"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_5xx_rate:rate5m{job="webook-migrator"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.01] }
              refId: C

      # ── ③ HTTP P99 延迟 ─────────────────────────────────
      # migrator 是控制台，无 SSE / LLM 长连接，阈值与 core 一致 500ms
      - uid: webook-migrator-p99
        title: Migrator HTTP P99 延迟 > 500ms
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "Migrator P99 延迟 {{ $values.B.Value }}s"
          runbook_url: "https://wiki.internal/runbook/migrator-latency"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_duration_p99:rate5m{job="webook-migrator"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      # ── ④ Goroutine 暴涨 ────────────────────────────────
      # migrator 含 IncrEngine partition workers + canal goroutines，正常 50-300 之间
      - uid: webook-migrator-goroutines
        title: Migrator Goroutine 数 > 5000
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Migrator Goroutine 数 {{ $values.B.Value }}（疑似 partition worker / canal 泄漏）"
          runbook_url: "https://wiki.internal/runbook/goroutine-leak"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'go_goroutines{job="webook-migrator"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5000] }
              refId: C
