apiVersion: 1

# webook-chat 服务级告警（镜像 webook-core.yml，job filter 限定到 webook-chat）
# metric 命名空间统一为 webook_*，service 区分靠 prometheus 自动注入的 job 标签
groups:
  - orgId: 1
    name: webook-chat
    folder: Webook
    interval: 1m
    rules:

      # ── ① 服务存活 ────────────────────────────────────────
      - uid: webook-chat-up
        title: Webook Chat 服务不可达
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Webook Chat 实例 {{ $labels.instance }} 不可达"
          runbook_url: "https://wiki.internal/runbook/webook-chat-down"
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'up{job="webook-chat"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      # ── ② HTTP 5xx 错误率 ─────────────────────────────────
      - uid: webook-chat-5xx-rate
        title: Chat HTTP 5xx 错误率 > 1%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Chat 5xx 错误率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/webook-chat-5xx"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_5xx_rate:rate5m{job="webook-chat"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.01] }
              refId: C

      # ── ③ HTTP P99 延迟 ─────────────────────────────────
      # chat 是 LLM 流式服务，SSE 长连接 P99 天然高，阈值放宽到 5s（vs core 500ms）
      - uid: webook-chat-p99
        title: Chat HTTP P99 延迟 > 5s
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "Chat P99 延迟 {{ $values.B.Value }}s"
          runbook_url: "https://wiki.internal/runbook/webook-chat-latency"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_duration_p99:rate5m{job="webook-chat"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [5] }
              refId: C

      # ── ④ Goroutine 暴涨 ────────────────────────────────
      - uid: webook-chat-goroutines
        title: Chat Goroutine 数 > 10000
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Chat Goroutine 数 {{ $values.B.Value }}（疑似 LLM 流泄漏）"
          runbook_url: "https://wiki.internal/runbook/goroutine-leak"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'go_goroutines{job="webook-chat"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [10000] }
              refId: C

      # ── ⑤ 业务限流激增（按 reason）─────────────────────────
      # reason=~".*_RATE_LIMITED"（CHAT_RATE_LIMITED）。阈值 0.5/s·10m 起步。镜像 core ⑥。
      - uid: webook-chat-biz-rate-limit
        title: Chat 业务限流激增（按 reason）
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "限流 {{ $labels.reason }} 速率 {{ $values.B.Value }}/s（滥用/容量信号）"
          runbook_url: "https://wiki.internal/runbook/webook-biz-rate-limit"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_biz_errors:rate5m{job="webook-chat", reason=~".*_RATE_LIMITED"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C
