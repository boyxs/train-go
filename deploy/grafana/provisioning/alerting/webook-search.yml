apiVersion: 1

# webook-search 服务级告警（镜像 webook-relation.yml；search 是纯 gRPC 后端，
# 业务指标走 webook_grpc_requests_*，无 HTTP 业务流量，故 5xx/P99 用 gRPC 表达式）
# metric 命名空间统一 webook_*，service 区分靠 prometheus 注入的 job 标签
groups:
  - orgId: 1
    name: webook-search
    folder: Webook
    interval: 1m
    rules:

      # ── ① 服务存活 ────────────────────────────────────────
      - uid: webook-search-up
        title: Webook Search 服务不可达
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Webook Search 实例 {{ $labels.instance }} 不可达"
          runbook_url: "https://wiki.internal/runbook/webook-search-down"
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'up{job="webook-search"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      # ── ② gRPC 错误率 > 5%（非 OK code 占比） ──────────────
      - uid: webook-search-grpc-error-rate
        title: Search gRPC 错误率 > 5%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Search gRPC 错误率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/webook-search-grpc-error"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'sum(rate(webook_grpc_requests_total{job="webook-search",type="server",code!="OK"}[5m])) / sum(rate(webook_grpc_requests_total{job="webook-search",type="server"}[5m]))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.05] }
              refId: C

      # ── ③ gRPC P99 延迟 > 2s ──────────────────────────────
      # search 走 ES 混合检索 + embedding，P99 天生高于纯 DB 服务；放宽到 2s
      - uid: webook-search-grpc-p99
        title: Search gRPC P99 延迟 > 2s
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "Search gRPC P99 延迟 {{ $values.B.Value }}s"
          runbook_url: "https://wiki.internal/runbook/webook-search-latency"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.99, sum(rate(webook_grpc_requests_duration_seconds_bucket{job="webook-search",type="server"}[5m])) by (le))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [2] }
              refId: C

      # ── ④ Goroutine 暴涨 ────────────────────────────────
      - uid: webook-search-goroutines
        title: Search Goroutine 数 > 10000
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Search Goroutine 数 {{ $values.B.Value }}（疑似泄漏）"
          runbook_url: "https://wiki.internal/runbook/goroutine-leak"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'go_goroutines{job="webook-search"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [10000] }
              refId: C
