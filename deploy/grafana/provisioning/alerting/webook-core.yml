apiVersion: 1

# 5 条核心告警规则（基于 Prometheus 已采集的指标）
# 评估周期 1 分钟，触发条件持续 5 分钟才正式 firing（避免抖动）
#
# Grafana Alerting 评估链路规则：
#   Query (A) → Reduce (B) → Threshold (C) → condition
#   每个 Threshold 表达式必须接一个 reduced 值，直接接 time series 会报
#   "looks like time series data, only reduced data can be alerted on"
groups:
  - orgId: 1
    name: webook-core
    folder: Webook                  # 必须在 Grafana 里有同名 folder（自动创建）
    interval: 1m
    rules:

      # ── ① 服务存活 ────────────────────────────────────────
      - uid: webook-core-up
        title: Webook Core 服务不可达
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Webook Core 实例 {{ $labels.instance }} 不可达"
          runbook_url: "https://wiki.internal/runbook/webook-core-down"
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'up{job="webook-core"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      # ── ② HTTP 5xx 错误率 ─────────────────────────────────
      # 直读 recording rule（webook:http_5xx_rate:rate5m），免每分钟评估两次 sum(rate(...))。
      # rule 已 by (job) 预聚合 → 这里 {job="webook-core"} 单 series。
      - uid: webook-5xx-rate
        title: HTTP 5xx 错误率 > 1%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "5xx 错误率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/webook-5xx"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_5xx_rate:rate5m{job="webook-core"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.01] }
              refId: C

      # ── ③ HTTP P99 延迟 ─────────────────────────────────
      - uid: webook-p99
        title: HTTP P99 延迟 > 500ms
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "P99 延迟 {{ $values.B.Value }}s"
          runbook_url: "https://wiki.internal/runbook/webook-latency"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_duration_p99:rate5m{job="webook-core"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      # ── ④ Goroutine 暴涨 ────────────────────────────────
      - uid: webook-goroutines
        title: Goroutine 数 > 10000
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Goroutine 数 {{ $values.B.Value }}（疑似泄漏）"
          runbook_url: "https://wiki.internal/runbook/goroutine-leak"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'go_goroutines{job="webook-core"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [10000] }
              refId: C

      # ── ⑤ MySQL 连接接近上限 ──────────────────────────────
      - uid: mysql-conn-saturation
        title: MySQL 连接使用率 > 80%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "MySQL 连接使用率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/mysql-conn"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'mysql_global_status_threads_connected / mysql_global_variables_max_connections'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.8] }
              refId: C

      # ── ⑥ 业务限流激增（按 reason）─────────────────────────
      # reason=~".*_RATE_LIMITED" 多序列各自触发，summary 点名是哪类限流。阈值 0.5/s·10m 起步。
      - uid: webook-core-biz-rate-limit
        title: 业务限流激增（按 reason）
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "限流 {{ $labels.reason }} 速率 {{ $values.B.Value }}/s（滥用/容量信号）"
          runbook_url: "https://wiki.internal/runbook/webook-biz-rate-limit"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_biz_errors:rate5m{job="webook-core", reason=~".*_RATE_LIMITED"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      # ── ⑦ 登录失败激增（疑似撞库）──────────────────────────
      # USER_OR_PASSWORD_INVALID 速率异常 = 撞库信号。阈值 2/s·5m 起步。
      - uid: webook-core-auth-bruteforce
        title: 登录失败激增（疑似撞库）
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "登录失败速率 {{ $values.B.Value }}/s（疑似撞库 / 暴破）"
          runbook_url: "https://wiki.internal/runbook/webook-auth-bruteforce"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'webook:http_biz_errors:rate5m{job="webook-core", reason="USER_OR_PASSWORD_INVALID"}'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [2] }
              refId: C
