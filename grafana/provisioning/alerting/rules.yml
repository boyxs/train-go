apiVersion: 1

# 5 条核心告警规则（基于 Prometheus 已采集的指标）
# 评估周期 1 分钟，触发条件持续 5 分钟才正式 firing（避免抖动）
#
# Grafana Alerting 评估链路规则：
#   Query (A) → Reduce (B) → Threshold (C) → condition
#   每个 Threshold 表达式必须接一个 reduced 值，直接接 time series 会报
#   "looks like time series data, only reduced data can be alerted on"
groups:
  - orgId: 1
    name: webook-core
    folder: Webook                  # 必须在 Grafana 里有同名 folder（自动创建）
    interval: 1m
    rules:

      # ── ① 服务存活 ────────────────────────────────────────
      - uid: webook-up
        title: Webook 服务不可达
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Webook 实例 {{ $labels.instance }} 不可达"
          runbook_url: "https://wiki.internal/runbook/webook-down"
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'up{job="webook-app"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: lt, params: [1] }
              refId: C

      # ── ② HTTP 5xx 错误率 ─────────────────────────────────
      - uid: webook-5xx-rate
        title: HTTP 5xx 错误率 > 1%
        condition: F
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "5xx 错误率 {{ $values.E.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/webook-5xx"
        data:
          - refId: A                                           # 分子：5xx rate (time series)
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'sum(rate(webook_http_requests_total{status=~"5.."}[5m]))'
              refId: A
          - refId: B                                           # 分母：总 rate (time series)
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'sum(rate(webook_http_requests_total[5m]))'
              refId: B
          - refId: C                                           # reduce A → 单值
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: C
          - refId: D                                           # reduce B → 单值
            datasourceUid: __expr__
            model:
              type: reduce
              expression: B
              reducer: last
              refId: D
          - refId: E                                           # math 求比例
            datasourceUid: __expr__
            model:
              type: math
              expression: '$C / $D'
              refId: E
          - refId: F                                           # threshold
            datasourceUid: __expr__
            model:
              type: threshold
              expression: E
              conditions:
                - evaluator: { type: gt, params: [0.01] }
              refId: F

      # ── ③ HTTP P99 延迟 ─────────────────────────────────
      - uid: webook-p99
        title: HTTP P99 延迟 > 500ms
        condition: C
        for: 10m
        noDataState: OK
        execErrState: Error
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "P99 延迟 {{ $values.B.Value }}s"
          runbook_url: "https://wiki.internal/runbook/webook-latency"
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'histogram_quantile(0.99, sum by (le) (rate(webook_http_requests_duration_seconds_bucket[5m])))'
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.5] }
              refId: C

      # ── ④ Goroutine 暴涨 ────────────────────────────────
      - uid: webook-goroutines
        title: Goroutine 数 > 10000
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "Goroutine 数 {{ $values.B.Value }}（疑似泄漏）"
          runbook_url: "https://wiki.internal/runbook/goroutine-leak"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'go_goroutines{job="webook-app"}'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [10000] }
              refId: C

      # ── ⑤ MySQL 连接接近上限 ──────────────────────────────
      - uid: mysql-conn-saturation
        title: MySQL 连接使用率 > 80%
        condition: C
        for: 5m
        noDataState: OK
        execErrState: Error
        labels:
          severity: high
          team: backend
        annotations:
          summary: "MySQL 连接使用率 {{ $values.B.Value | humanizePercentage }}"
          runbook_url: "https://wiki.internal/runbook/mysql-conn"
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: 'mysql_global_status_threads_connected / mysql_global_variables_max_connections'
              refId: A
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { type: gt, params: [0.8] }
              refId: C
