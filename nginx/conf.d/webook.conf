# ── upstream 定义 ──────────────────────────────────────────
upstream webook_backend {
    server webook:8089 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream webook_frontend {
    server webook-fe:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ── 公共代理参数 ───────────────────────────────────────────
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;

proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

server {
    listen      80 default_server;
    server_name _;

    # ── 安全响应头 ─────────────────────────────────────────
    add_header X-Content-Type-Options nosniff           always;
    add_header X-Frame-Options        SAMEORIGIN        always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header X-XSS-Protection       "1; mode=block"   always;
    # 上 HTTPS 后启用：
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── 健康检查（独立路径，Nginx 自身存活） ──────────────
    # 用 default_type 而非 add_header Content-Type：避免触发 nginx 子 location add_header
    # 完全替换父级响应头的行为，保留 server 级的 4 个安全头继承
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # ── /api → 后端（剥掉 /api 前缀） ─────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://webook_backend/;       # 末尾的 / 关键：去前缀
    }

    # 登录单独限流
    location = /api/user/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://webook_backend/user/login;
    }

    # SSE 流式接口：关闭 buffering、放长 timeout
    # 精确收紧到 stream / resume 两个 endpoint，不再允许尾随任意字符
    location ~ ^/api/(chat/message/(stream|resume))$ {
        proxy_pass http://webook_backend/$1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }

    # ── 后端 metrics：仅内网，外网拒绝 ─────────────────────
    # 调试：响应回显 nginx 看到的 client IP，帮助诊断 allow/deny 是否命中
    location = /metrics {
        allow 172.21.0.0/16;     # docker bridge 网段
        allow 127.0.0.1;
        allow 192.168.0.0/16;    # 局域网整段
        deny all;
        add_header X-Debug-Client $remote_addr always;
        proxy_pass http://webook_backend/metrics;
    }

    # ── Next.js 静态资源：长缓存 ─────────────────────────
    # 注意：nginx add_header 在子 location 内出现一次会替换父级所有，不继承。
    #      所以静态资源 location 必须重复写一遍安全头。
    location /_next/static/ {
        proxy_pass http://webook_frontend;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options nosniff           always;
        add_header X-Frame-Options        SAMEORIGIN        always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header X-XSS-Protection       "1; mode=block"   always;
    }

    location /static/ {
        proxy_pass http://webook_frontend;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options nosniff           always;
        add_header X-Frame-Options        SAMEORIGIN        always;
        add_header Referrer-Policy        strict-origin-when-cross-origin always;
        add_header X-XSS-Protection       "1; mode=block"   always;
    }

    # ── 其余全部 → 前端 ───────────────────────────────────
    location / {
        proxy_pass http://webook_frontend;
    }
}
