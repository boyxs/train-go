# ═══════════════════════════════════════════════════════════════
# Prometheus 告警规则 / Recording rules 文件
#
# 引用方式：在 prometheus.yml 里 rule_files: ["rules/*.rules.yml"]
# 热更新：curl -X POST http://prometheus:9090/-/reload
#         （需启动时加 --web.enable-lifecycle）
#
# 注意：这是 Prometheus 原生告警（发到 Alertmanager）。
#       项目目前用 Grafana Alerting 管理告警，Prometheus 侧不配这个文件也 OK。
#       只有想把告警规则"贴近数据源"或"跨 Grafana 复用"时才配。
# ═══════════════════════════════════════════════════════════════

groups:

  # ═══════════════ 告警规则组（evaluated 出 alert） ═══════════════
  - name: webook-http                # 组名
    interval: 1m                     # 评估周期（默认用 global.evaluation_interval）
    rules:

      # ─── Alert 规则：表达式为 true 时告警 ──────────────────────
      - alert: WebookDown
        expr: up{job="webook-app"} == 0       # PromQL
        for: 1m                               # 持续多久才 firing
        labels:                                # 附加 label（供 Alertmanager 路由）
          severity: critical
          team: backend
        annotations:
          summary: "Webook 实例 {{ $labels.instance }} 不可达"
          description: |
            实例 {{ $labels.instance }} 在过去 1 分钟无法被抓取。
            job={{ $labels.job }} cluster={{ $labels.cluster }}
          runbook_url: "https://wiki/runbook/webook-down"

      - alert: Webook5xxHigh
        expr: |
          sum(rate(webook_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(webook_http_requests_total[5m]))
          > 0.01
        for: 5m
        labels:
          severity: high
          team: backend
        annotations:
          summary: "5xx 错误率 {{ $value | humanizePercentage }}"
          runbook_url: "https://wiki/runbook/webook-5xx"

      - alert: WebookP99High
        expr: |
          histogram_quantile(0.99,
            sum by (le) (rate(webook_http_requests_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 10m
        labels:
          severity: medium
          team: backend
        annotations:
          summary: "P99 延迟 {{ $value }}s"

  - name: infra                      # 另一组
    interval: 30s
    rules:
      - alert: MySQLConnectionsHigh
        expr: mysql_global_status_threads_connected / mysql_global_variables_max_connections > 0.8
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "MySQL 连接使用率 {{ $value | humanizePercentage }}"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Redis 内存使用率 {{ $value | humanizePercentage }}"

      - alert: GoroutineLeak
        expr: go_goroutines{job="webook-app"} > 10000
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Goroutine 暴涨 {{ $value }}（疑似泄漏）"


  # ═══════════════ Recording Rules（预计算）═══════════════
  # 作用：把昂贵 PromQL 预先算好存成新指标，加速 dashboard / alert 查询
  - name: webook-recording
    interval: 30s
    rules:

      # ─── Recording 规则：record + expr + labels（无 alert/for/annotations）──
      - record: webook:http_qps:rate5m              # 新指标名（建议用冒号分隔命名空间）
        expr: sum(rate(webook_http_requests_total[5m]))
        labels:
          aggregated_by: prometheus

      - record: webook:http_error_rate:rate5m
        expr: |
          sum(rate(webook_http_requests_total{status=~"5.."}[5m]))
          /
          sum(rate(webook_http_requests_total[5m]))

      - record: webook:http_p99:rate5m
        expr: |
          histogram_quantile(0.99,
            sum by (le, pattern) (rate(webook_http_requests_duration_seconds_bucket[5m]))
          )

# ═════════════════════════════════════════════════════════════════
# annotations 可用的模板变量：
#   $labels         - alert 的完整 labels（{{ $labels.instance }}）
#   $value          - alert 的表达式值（{{ $value }}）
#   $externalLabels - Prometheus 的 external_labels
#
# 可用的模板函数（Prometheus template）：
#   humanize            1.23k / 4.5M
#   humanizePercentage  0.0123 → 1.23%
#   humanizeDuration    秒 → 3h4m5s
#   humanizeTimestamp   Unix 秒 → 人类时间
#   printf              格式化
#   title / toUpper / toLower
#   match / reReplaceAll
#
# 告警规则命名约定：
#   - alert 名用 PascalCase（WebookDown）
#   - record 名用 "项目:指标:聚合方式" 风格（webook:http_qps:rate5m）
#   - severity: critical / high / medium / low（与 Grafana policies 里的 matcher 对齐）
#
# 验证规则文件语法：
#   promtool check rules rules/webook.rules.yml
# ═════════════════════════════════════════════════════════════════
