global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # webook 应用（本地开发用 host.docker.internal，容器部署可改 webook-app:8089）
  - job_name: 'webook-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8089']

  # MySQL
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Kafka
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # 宿主机（Node Exporter）
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Grafana 自监控：/metrics 在部分版本默认要 basic auth，显式带上避免 401
  # 凭证与 docker-compose grafana 服务的 GF_SECURITY_ADMIN_USER/PASSWORD 一致
  - job_name: 'grafana'
    basic_auth:
      username: admin
      password: admin
    static_configs:
      - targets: ['grafana:3000']

  # OTel Collector 自监控（需在 collector config 里 telemetry.metrics.address 暴露）
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  # Zipkin 自监控（micrometer 暴露在 /prometheus；slim 版无此端点）
  - job_name: 'zipkin'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['zipkin:9411']
